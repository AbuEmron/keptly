<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#11182A">
<meta name="description" content="AVENOR — the operating system for your life. Goals, projects, home, vehicles, documents, family, and finances in one place.">
<title>AVENOR — Life Operating System</title>
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="AVENOR">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Marcellus&family=Hanken+Grotesk:wght@400;500;600;700&family=Spline+Sans+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='14' fill='%2311182A'/%3E%3Cpath d='M32 14 L48 50 H42.5 L32 25.5 L21.5 50 H16 Z' fill='%23F3F4F6'/%3E%3Crect x='25' y='38' width='14' height='2.6' rx='1.3' fill='%23B6924E'/%3E%3C/svg%3E">
<style>
/* ============ AVENOR DESIGN SYSTEM ============
   Palette   : Ink #11182A · Porcelain #F3F4F6 · Card #FFFFFF · Brass #A07E3B · Signal #B3261E · Verdant #2E7D5B
   Type      : Marcellus (display) · Hanken Grotesk (body) · Spline Sans Mono (figures)
   Spacing   : 4px base scale (4 8 12 16 20 24 32 40 56)
   Radius    : 10 / 16 / 22 · Hairline: 1px #E4E6EB
   Motion    : 180ms ease-out micro · 320ms cubic-bezier(.22,1,.36,1) sheets
================================================ */
:root{
  --ink:#11182A; --ink-2:#3A4256; --ink-3:#555D70;
  --porcelain:#F3F4F6; --card:#FFFFFF; --hairline:#E4E6EB; --hairline-2:#D7DAE0;
  --brass:#A07E3B; --brass-2:#B6924E; --brass-tint:#F4EDDF;
  --signal:#B3261E; --signal-tint:#FBEAE8;
  --verdant:#2E7D5B; --verdant-tint:#E6F1EC;
  --r-s:10px; --r-m:16px; --r-l:22px;
  --shadow-1:0 1px 2px rgba(17,24,42,.05),0 4px 14px rgba(17,24,42,.06);
  --shadow-2:0 8px 30px rgba(17,24,42,.14);
  --font-d:'Marcellus',serif; --font-b:'Hanken Grotesk',system-ui,sans-serif; --font-m:'Spline Sans Mono',monospace;
  --safe-b:env(safe-area-inset-bottom,0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}
body{font-family:var(--font-b);background:var(--porcelain);color:var(--ink);font-size:15.5px;line-height:1.55;min-height:100dvh}
button{font-family:inherit;font-size:inherit;border:none;background:none;cursor:pointer;color:inherit}
input,select,textarea{font-family:inherit;font-size:16px;color:var(--ink)}
::selection{background:var(--brass-tint)}
:focus-visible{outline:2px solid var(--brass);outline-offset:2px;border-radius:4px}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ---------- shell ---------- */
.app{max-width:1180px;margin:0 auto;display:flex;min-height:100dvh}
.rail{display:none}
.main{flex:1;min-width:0;padding:0 18px calc(96px + var(--safe-b));max-width:680px;margin:0 auto;width:100%}
@media(min-width:900px){
  .rail{display:flex;flex-direction:column;gap:4px;width:230px;padding:28px 14px;position:sticky;top:0;height:100dvh;border-right:1px solid var(--hairline)}
  .main{padding:0 40px 60px}
  .tabbar{display:none!important}
}
/* top bar */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px;position:sticky;top:0;background:linear-gradient(var(--porcelain) 78%,rgba(243,244,246,0));z-index:30}
.brandline{display:flex;align-items:center;gap:10px}
.wordmark{font-family:var(--font-d);font-size:19px;letter-spacing:.34em;text-indent:.34em;color:var(--ink)}
@media(min-width:900px){.topbar .brandline{visibility:hidden}}
.sos{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--hairline);border-radius:999px;padding:7px 14px 7px 11px;font-weight:600;font-size:13px;color:var(--signal);box-shadow:var(--shadow-1);transition:transform .18s ease-out}
.sos:active{transform:scale(.95)}
.sos .dot{width:8px;height:8px;border-radius:50%;background:var(--signal);box-shadow:0 0 0 3px var(--signal-tint)}

/* rail nav */
.rail .wordmark{font-size:17px;margin:2px 8px 22px}
.navbtn{display:flex;align-items:center;gap:11px;padding:10px 12px;border-radius:var(--r-s);color:var(--ink-2);font-weight:500;font-size:14.5px;transition:background .18s ease-out,color .18s}
.navbtn svg{width:19px;height:19px;flex:none}
.navbtn:hover{background:#fff}
.navbtn.on{background:var(--ink);color:#fff}
.navbtn.on .ico-stroke{stroke:#fff}
.rail .spacer{flex:1}

/* tab bar (mobile) */
.tabbar{position:fixed;bottom:0;left:0;right:0;z-index:40;display:flex;justify-content:space-around;background:rgba(255,255,255,.88);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);border-top:1px solid var(--hairline);padding:8px 6px calc(8px + var(--safe-b))}
.tab{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:11px;font-weight:600;letter-spacing:.02em;color:var(--ink-3);padding:4px 10px;border-radius:12px;transition:color .18s ease-out;min-width:58px}
.tab svg{width:21px;height:21px}
.tab.on{color:var(--ink)}
.tab.on .ico-stroke{stroke:var(--ink)}
.ico-stroke{stroke:currentColor;fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}

/* ---------- primitives ---------- */
.eyebrow{font-family:var(--font-d);font-size:11.5px;letter-spacing:.26em;text-transform:uppercase;color:var(--brass);display:flex;align-items:center;gap:10px}
.eyebrow::after{content:"";flex:1;height:1px;background:var(--hairline-2)}
h1.page{font-family:var(--font-d);font-size:30px;line-height:1.15;font-weight:400;margin:6px 0 2px}
.sub{color:var(--ink-3);font-size:14px}
.section{margin-top:30px}
.card{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-m);box-shadow:var(--shadow-1)}
.card.pad{padding:18px}
.rowlist .row{display:flex;align-items:center;gap:13px;padding:14px 16px;border-bottom:1px solid var(--hairline);transition:background .18s}
.rowlist .row:last-child{border-bottom:none}
.rowlist .row:active{background:var(--porcelain)}
.row .grow{flex:1;min-width:0}
.row .title{font-weight:600;font-size:15px;overflow-wrap:anywhere}
.row .meta{font-size:13px;color:var(--ink-3);margin-top:1px}
.mono{font-family:var(--font-m);font-size:13px}
.chip{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:3px 9px;border-radius:999px;background:var(--porcelain);color:var(--ink-2)}
.chip.brass{background:var(--brass-tint);color:var(--brass)}
.chip.green{background:var(--verdant-tint);color:var(--verdant)}
.chip.red{background:var(--signal-tint);color:var(--signal)}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;font-weight:600;font-size:14.5px;border-radius:999px;padding:12px 22px;transition:transform .18s ease-out,opacity .18s}
.btn:active{transform:scale(.96)}
.btn-ink{background:var(--ink);color:#fff}
.btn-ghost{border:1px solid var(--hairline-2);background:var(--card)}
.btn-quiet{color:var(--ink-3);font-size:13.5px;padding:8px 12px}
.iconbtn{width:38px;height:38px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;border:1px solid var(--hairline);background:var(--card);transition:transform .18s}
.iconbtn:active{transform:scale(.92)}
.empty{padding:34px 20px;text-align:center;color:var(--ink-3)}
.empty .glyph{font-family:var(--font-d);font-size:26px;color:var(--brass);margin-bottom:8px}
.empty p{font-size:14px;max-width:300px;margin:0 auto 14px}
.fab{position:fixed;right:18px;bottom:calc(86px + var(--safe-b));z-index:35;width:56px;height:56px;border-radius:50%;background:var(--ink);color:#fff;display:flex;align-items:center;justify-content:center;box-shadow:var(--shadow-2);transition:transform .18s ease-out}
.fab:active{transform:scale(.92)}
@media(min-width:900px){.fab{bottom:32px;right:32px}}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.stat{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-m);padding:15px 16px}
.stat .k{font-size:11.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--ink-3)}
.stat .v{font-family:var(--font-m);font-size:21px;font-weight:600;margin-top:4px}
.progress{height:5px;border-radius:999px;background:var(--porcelain);overflow:hidden}
.progress i{display:block;height:100%;border-radius:999px;background:var(--brass-2);transition:width .4s cubic-bezier(.22,1,.36,1)}

/* pulse gauge — signature element */
.pulsecard{background:var(--ink);color:#fff;border-radius:var(--r-l);padding:22px 22px 18px;position:relative;overflow:hidden}
.pulsecard::after{content:"";position:absolute;inset:0;background:radial-gradient(120% 90% at 85% -10%,rgba(182,146,78,.28),transparent 55%);pointer-events:none}
.pulsecard .eyebrow{color:var(--brass-2)}
.pulsecard .eyebrow::after{background:rgba(255,255,255,.14)}
.gaugewrap{display:flex;align-items:center;gap:20px;margin-top:14px}
.gauge{width:108px;height:108px;flex:none}
.gauge .track{stroke:rgba(255,255,255,.12)}
.gauge .arc{stroke:var(--brass-2);transition:stroke-dashoffset .8s cubic-bezier(.22,1,.36,1)}
.gauge text{font-family:var(--font-d);fill:#fff}
.pulsefacts{display:flex;flex-direction:column;gap:7px;font-size:14px;color:rgba(255,255,255,.92)}
.pulsefacts b{color:#fff;font-weight:600}

/* domain registry */
.registry{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:14px}
.domain{background:var(--card);border:1px solid var(--hairline);border-radius:var(--r-m);padding:16px 15px 14px;display:flex;flex-direction:column;gap:9px;position:relative;transition:transform .18s ease-out,box-shadow .18s;text-align:left}
.domain:active{transform:scale(.97)}
.domain::before{content:"";position:absolute;top:0;left:15px;right:15px;height:2px;border-radius:2px;background:var(--brass-tint)}
.domain .dname{font-family:var(--font-d);font-size:13px;letter-spacing:.18em;text-transform:uppercase}
.domain .dcount{font-size:12.5px;color:var(--ink-3)}
.domain svg{width:20px;height:20px;color:var(--brass)}

/* sheets & overlays */
.scrim{position:fixed;inset:0;background:rgba(17,24,42,.42);backdrop-filter:blur(3px);z-index:60;opacity:0;transition:opacity .25s;pointer-events:none}
.scrim.show{opacity:1;pointer-events:auto}
.sheet{position:fixed;left:0;right:0;bottom:0;z-index:61;background:var(--card);border-radius:var(--r-l) var(--r-l) 0 0;padding:14px 20px calc(24px + var(--safe-b));transform:translateY(105%);transition:transform .32s cubic-bezier(.22,1,.36,1);max-height:86dvh;overflow-y:auto;box-shadow:var(--shadow-2)}
.sheet.show{transform:translateY(0)}
@media(min-width:900px){.sheet{left:50%;right:auto;bottom:auto;top:50%;width:480px;max-height:80dvh;border-radius:var(--r-l);transform:translate(-50%,-46%) scale(.97);opacity:0}
.sheet.show{transform:translate(-50%,-50%) scale(1);opacity:1}}
.sheet .grab{width:38px;height:4px;border-radius:4px;background:var(--hairline-2);margin:0 auto 14px}
.sheet h3{font-family:var(--font-d);font-size:20px;font-weight:400;margin-bottom:14px}
.field{margin-bottom:13px}
.field label{display:block;font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:var(--ink-3);margin-bottom:6px}
.field input,.field select,.field textarea{width:100%;padding:12px 14px;border:1px solid var(--hairline-2);border-radius:var(--r-s);background:var(--porcelain);transition:border-color .18s}
.field textarea{min-height:74px;resize:vertical}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--brass);background:#fff}
.sheet .actions{display:flex;gap:10px;margin-top:18px}
.sheet .actions .btn{flex:1}

/* emergency overlay */
.emg{position:fixed;inset:0;z-index:80;background:#1A0E0D;color:#fff;transform:translateY(102%);transition:transform .32s cubic-bezier(.22,1,.36,1);overflow-y:auto;padding:26px 22px calc(30px + var(--safe-b))}
.emg.show{transform:translateY(0)}
.emg .eyebrow{color:#E8857C}.emg .eyebrow::after{background:rgba(255,255,255,.16)}
.emg h2{font-family:var(--font-d);font-size:28px;font-weight:400;margin:8px 0 18px}
.emg .block{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:var(--r-m);padding:16px;margin-bottom:13px}
.emg .block h4{font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:#E8857C;margin-bottom:8px}
.emg a.call{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid rgba(255,255,255,.1);color:#fff;text-decoration:none;font-weight:600}
.emg a.call:last-child{border-bottom:none}
.emg a.call span{font-family:var(--font-m);font-size:13px;color:rgba(255,255,255,.85)}
.emg pre{font-family:var(--font-b);white-space:pre-wrap;font-size:14.5px;color:rgba(255,255,255,.94);overflow-wrap:anywhere}
.emg .close{margin-top:6px;width:100%;padding:14px;border-radius:999px;background:#fff;color:#1A0E0D;font-weight:700}

.toast{position:fixed;left:50%;bottom:calc(104px + var(--safe-b));transform:translate(-50%,16px);background:var(--ink);color:#fff;padding:11px 20px;border-radius:999px;font-size:13.5px;font-weight:600;opacity:0;transition:all .28s cubic-bezier(.22,1,.36,1);z-index:90;pointer-events:none;box-shadow:var(--shadow-2)}
.toast.show{opacity:1;transform:translate(-50%,0)}
.view{animation:rise .34s cubic-bezier(.22,1,.36,1)}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.check{width:24px;height:24px;border-radius:50%;border:1.6px solid var(--hairline-2);flex:none;display:flex;align-items:center;justify-content:center;transition:all .18s}
.check.on{background:var(--verdant);border-color:var(--verdant)}
.check svg{width:13px;height:13px;stroke:#fff;stroke-width:2.4;fill:none;stroke-linecap:round;stroke-linejoin:round;opacity:0;transform:scale(.5);transition:all .18s}
.check.on svg{opacity:1;transform:scale(1)}
.done .title{text-decoration:line-through;color:var(--ink-3)}
.backlink{display:inline-flex;align-items:center;gap:6px;color:var(--ink-3);font-size:13.5px;font-weight:600;padding:6px 0;margin-top:8px}
.hgroup{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.netline{display:flex;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--hairline);font-size:14.5px}
.netline:last-child{border:none}.netline b{font-family:var(--font-m)}

/* launch splash */
.splash{position:fixed;inset:0;z-index:200;background:var(--ink);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .45s ease,visibility .45s}
.splash.gone{opacity:0;visibility:hidden;pointer-events:none}
.splash .mark{animation:splashrise .7s cubic-bezier(.22,1,.36,1)}
.splash .wm{font-family:var(--font-d);color:#F3F4F6;font-size:21px;letter-spacing:.4em;text-indent:.4em;animation:splashrise .7s .12s cubic-bezier(.22,1,.36,1) both}
.splash .bar{width:120px;height:2px;border-radius:2px;background:rgba(255,255,255,.12);overflow:hidden}
.splash .bar i{display:block;height:100%;width:40%;background:var(--brass-2);animation:splashload 1s ease-in-out infinite alternate}
@keyframes splashrise{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes splashload{from{transform:translateX(-60%)}to{transform:translateX(260%)}}
/* tour */
.tourwrap{position:fixed;inset:0;z-index:101}
.tourcard{position:fixed;left:50%;bottom:calc(96px + var(--safe-b));transform:translateX(-50%);width:min(420px,calc(100% - 32px));background:var(--card);border-radius:var(--r-l);padding:20px 22px;box-shadow:var(--shadow-2);z-index:102;animation:rise .3s cubic-bezier(.22,1,.36,1)}
@media(min-width:900px){.tourcard{bottom:auto;top:50%;transform:translate(-50%,-50%)}}
.tourcard h3{font-family:var(--font-d);font-size:21px;font-weight:400;margin:8px 0 8px}
.tourcard p{font-size:14.5px;color:var(--ink-2);line-height:1.55}
.tourdots{display:flex;gap:6px;margin:16px 0}
.tourdots i{width:6px;height:6px;border-radius:50%;background:var(--hairline-2)}
.tourdots i.on{background:var(--brass-2);width:18px;border-radius:3px}
.touract{display:flex;justify-content:space-between;align-items:center;gap:10px}
</style>
</head>
<body>
<div class="splash" id="splash" aria-hidden="true">
  <svg class="mark" width="72" height="72" viewBox="0 0 64 64"><rect width="64" height="64" rx="14" fill="#11182A" stroke="rgba(255,255,255,.12)"/><path d="M32 14 L48 50 H42.5 L32 25.5 L21.5 50 H16 Z" fill="#F3F4F6"/><rect x="25" y="38" width="14" height="2.6" rx="1.3" fill="#B6924E"/></svg>
  <span class="wm">AVENOR</span>
  <div class="bar"><i></i></div>
</div>
<div class="app">
  <nav class="rail" id="rail" aria-label="Primary"></nav>
  <main class="main">
    <div class="topbar">
      <div class="brandline">
        <svg width="26" height="26" viewBox="0 0 64 64" aria-hidden="true"><rect width="64" height="64" rx="14" fill="#11182A"/><path d="M32 14 L48 50 H42.5 L32 25.5 L21.5 50 H16 Z" fill="#F3F4F6"/><rect x="25" y="38" width="14" height="2.6" rx="1.3" fill="#B6924E"/></svg>
        <span class="wordmark">AVENOR</span>
      </div>
      <div style="display:flex;gap:9px;align-items:center">
        <button class="sos" onclick="openEmergency()" aria-label="Open emergency mode"><span class="dot"></span>Emergency</button>
        <button class="iconbtn" onclick="openSearch()" aria-label="Search"><svg width="18" height="18" viewBox="0 0 24 24"><circle class="ico-stroke" cx="11" cy="11" r="7"/><path class="ico-stroke" d="M20 20l-3.5-3.5"/></svg></button>
        <button class="iconbtn" onclick="go('settings')" aria-label="Settings"><svg width="18" height="18" viewBox="0 0 24 24"><circle class="ico-stroke" cx="12" cy="12" r="3"/><path class="ico-stroke" d="M12 3.5v2.2M12 18.3v2.2M3.5 12h2.2M18.3 12h2.2M5.9 5.9l1.6 1.6M16.5 16.5l1.6 1.6M18.1 5.9l-1.6 1.6M7.5 16.5l-1.6 1.6"/></svg></button>
      </div>
    </div>
    <div id="view" class="view"></div>
  </main>
</div>
<nav class="tabbar" id="tabbar" aria-label="Primary"></nav>
<button class="fab" id="fab" onclick="fabAction()" aria-label="Add"><svg width="22" height="22" viewBox="0 0 24 24"><path class="ico-stroke" d="M12 5v14M5 12h14"/></svg></button>
<div class="scrim" id="scrim" onclick="closeSheet()"></div>
<div class="sheet" id="sheet" role="dialog" aria-modal="true"></div>
<div class="emg" id="emg" role="dialog" aria-modal="true"></div>
<div class="toast" id="toast" role="status"></div>
<script>window.AVENOR_CONFIG = window.AVENOR_CONFIG || { SUPABASE_URL:"", SUPABASE_ANON_KEY:"" };</script>
<script src="config.js" onerror="console.warn('config.js not found — running offline-only')"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js" onerror="window.__noSupabase=1"></script>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js" onerror="window.__noOCR=1"></script>
<script>
/* ================= AVENOR CORE =================
   Offline-first: local storage is the source of truth.
   Cloud sync attaches later behind the same save() call. */
const store = (()=>{ // safe local persistence with in-memory fallback
  let mem={}, ok=false;
  try{ localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok=true; }catch(e){ ok=false; }
  return {
    get(k){ try{ return ok ? JSON.parse(localStorage.getItem(k)) : (mem[k]??null);}catch(e){return null;} },
    set(k,v){ try{ ok ? localStorage.setItem(k,JSON.stringify(v)) : (mem[k]=v);}catch(e){ mem[k]=v; } }
  };
})();
const uid = ()=> Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const todayISO = ()=> new Date().toISOString().slice(0,10);
const fmtMoney = n => '$'+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0});
const fmtDate = d => d ? new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}) : '—';
const daysUntil = d => d ? Math.ceil((new Date(d+'T00:00:00') - new Date(todayISO()+'T00:00:00'))/86400000) : null;

/* ---------- life pulse score ---------- */
function pulse(){
  let score=72, notes=[];
  const allTasks = S.projects.flatMap(p=>p.tasks||[]);
  const overdue = allTasks.filter(t=>!t.done && t.due && daysUntil(t.due)<0).length;
  score -= Math.min(20, overdue*4);
  if(overdue) notes.push(`<b>${overdue}</b> overdue task${overdue>1?'s':''}`);
  const renewals = renewalFeed().filter(r=>r.days!==null && r.days<=14).length;
  score -= Math.min(15, renewals*5);
  if(renewals) notes.push(`<b>${renewals}</b> renewal${renewals>1?'s':''} due within 14 days`);
  const activeGoals = S.goals.length;
  if(activeGoals){ score += Math.min(15, activeGoals*3); notes.push(`<b>${activeGoals}</b> active goal${activeGoals>1?'s':''}`); }
  const doneToday = allTasks.filter(t=>t.done && t.doneAt && (Date.now()-t.doneAt)<86400000).length;
  if(doneToday){ score += Math.min(10, doneToday*2); notes.push(`<b>${doneToday}</b> completed today`); }
  if(!notes.length) notes.push('Add goals, projects and renewals to bring Avenor to life.');
  return {score: Math.max(8, Math.min(99, score)), notes};
}
function renewalFeed(){
  const out=[];
  S.home.forEach(h=>{ if(h.nextDue) out.push({label:h.item+' — service', date:h.nextDue, days:daysUntil(h.nextDue), goto:'home'});
                      if(h.warrantyUntil) out.push({label:h.item+' — warranty ends', date:h.warrantyUntil, days:daysUntil(h.warrantyUntil), goto:'home'}); });
  S.vehicles.forEach(v=>{ if(v.insurance) out.push({label:v.name+' — insurance', date:v.insurance, days:daysUntil(v.insurance), goto:'vehicles'});
                          if(v.registration) out.push({label:v.name+' — registration', date:v.registration, days:daysUntil(v.registration), goto:'vehicles'}); });
  S.vault.forEach(d=>{ if(d.expires) out.push({label:d.title+' — expires', date:d.expires, days:daysUntil(d.expires), goto:'vault'}); });
  return out.filter(r=>r.days!==null).sort((a,b)=>a.days-b.days);
}

/* ================= VAULT: scan, OCR, encrypt ================= */
let _vaultKey=null;            // CryptoKey for this session
function vaultUnlocked(){ return !!_vaultKey; }
async function deriveKey(pass){
  const enc=new TextEncoder();
  const salt = S.vaultSalt || (S.vaultSalt = Array.from(crypto.getRandomValues(new Uint8Array(16))));
  const base = await crypto.subtle.importKey('raw', enc.encode(pass), 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    {name:'PBKDF2', salt:new Uint8Array(salt), iterations:150000, hash:'SHA-256'},
    base, {name:'AES-GCM', length:256}, false, ['encrypt','decrypt']);
}
async function encryptBlob(dataURL){
  const iv=crypto.getRandomValues(new Uint8Array(12));
  const bytes=new TextEncoder().encode(dataURL);
  const ct=await crypto.subtle.encrypt({name:'AES-GCM', iv}, _vaultKey, bytes);
  return { iv:Array.from(iv), ct:btoa(String.fromCharCode(...new Uint8Array(ct))) };
}
async function decryptBlob(rec){
  const ct=Uint8Array.from(atob(rec.ct), c=>c.charCodeAt(0));
  const pt=await crypto.subtle.decrypt({name:'AES-GCM', iv:new Uint8Array(rec.iv)}, _vaultKey, ct);
  return new TextDecoder().decode(pt);
}
function sheetUnlock(then){
  const first=!S.vaultSalt;
  openSheet(`<h3>${first?'Set a vault passphrase':'Unlock your vault'}</h3>
  <p class="sub" style="margin:-6px 0 14px">${first?'Your scanned documents are encrypted on this device with this passphrase. We never see it — and it can\u2019t be recovered, so keep it safe.':'Enter your vault passphrase to view and add encrypted documents.'}</p>
  ${FLD('vk','Passphrase','password','','')}
  <div class="actions"><button class="btn btn-ink" onclick="doUnlock(${then?`'${then}'`:'null'})">${first?'Create vault':'Unlock'}</button></div>`);
  setTimeout(()=>document.getElementById('vk')?.focus(),120);
}
async function doUnlock(then){
  const p=fval('vk'); if(p.length<4) return toast('Use at least 4 characters');
  try{
    _vaultKey=await deriveKey(p);
    // verify against a stored check token (detects wrong passphrase)
    if(S.vaultCheck){ try{ await decryptBlob(S.vaultCheck); }catch(e){ _vaultKey=null; return toast('That passphrase doesn\u2019t match'); } }
    else { S.vaultCheck=await encryptBlob('avenor-ok'); save(); }
    closeSheet(); toast('Vault unlocked'); if(then==='scan') startScan(); else render();
  }catch(e){ toast('Could not unlock'); }
}
function lockVault(){ _vaultKey=null; toast('Vault locked'); render(); }

/* capture -> compress -> OCR -> parse -> prefill */
function startScan(){
  if(!vaultUnlocked()) return sheetUnlock('scan');
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*'; inp.capture='environment';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(f) processScan(f); };
  inp.click();
}
function compress(file, max=1400){
  return new Promise(res=>{
    const img=new Image(), rd=new FileReader();
    rd.onload=()=>{ img.onload=()=>{
      let {width:w,height:h}=img; const s=Math.min(1, max/Math.max(w,h)); w*=s; h*=s;
      const c=document.createElement('canvas'); c.width=w; c.height=h;
      c.getContext('2d').drawImage(img,0,0,w,h);
      res(c.toDataURL('image/jpeg',0.7));
    }; img.src=rd.result; };
    rd.readAsDataURL(file);
  });
}
function parseDoc(text){
  const out={ref:'',expires:''};
  // dates in many formats -> pick the latest future-ish one as expiry
  const months={jan:0,feb:1,mar:2,apr:3,may:4,jun:5,jul:6,aug:7,sep:8,oct:9,nov:10,dec:11};
  const found=[];
  (text.match(/\b(\d{1,2})[\/\-\.](\d{1,2})[\/\-\.](\d{2,4})\b/g)||[]).forEach(m=>{
    const p=m.split(/[\/\-\.]/).map(Number); let y=p[2]; if(y<100)y+=2000;
    let mo=p[0]-1, da=p[1]; if(mo>11){ mo=p[1]-1; da=p[0]; }
    const d=new Date(y,mo,da); if(!isNaN(d)) found.push(d);
  });
  (text.match(/\b(\d{1,2})\s+(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\.?\s+(\d{2,4})\b/gi)||[]).forEach(m=>{
    const x=m.toLowerCase().match(/(\d{1,2})\s+([a-z]{3})[a-z]*\.?\s+(\d{2,4})/);
    if(x){ let y=+x[3]; if(y<100)y+=2000; const d=new Date(y,months[x[2]],+x[1]); if(!isNaN(d)) found.push(d); }
  });
  // prefer a date labelled expiry/expires/valid thru, else the latest date
  const today=new Date();
  const future=found.filter(d=>d>today).sort((a,b)=>a-b);
  const pick=future[0]||found.sort((a,b)=>b-a)[0];
  if(pick) out.expires=pick.toISOString().slice(0,10);
  // reference / policy / id numbers
  const ref=(text.match(/(?:policy|member|account|acct)\s*(?:no\.?|number|#|id)?\s*[:#]?\s*([A-Z0-9]{2,}(?:-[A-Z0-9]+)*)/i)
    || text.match(/(?:passport|license|licence|id)\s*(?:no\.?|number|#)?\s*[:#]?\s*([A-Z0-9]{5,})/i));
  if(ref) out.ref=ref[1].trim().replace(/\s+/g,'');
  // guess a category
  const t=text.toLowerCase();
  out.category = /passport|driver|licen[cs]e|identity|birth/.test(t)?'Identity'
    : /insur|policy|coverage|premium/.test(t)?'Insurance'
    : /warrant/.test(t)?'Warranties'
    : /lease|agreement|contract/.test(t)?'Contracts'
    : /receipt|invoice|total|paid/.test(t)?'Receipts'
    : /patient|medical|prescription|rx|clinic/.test(t)?'Medical' : 'Other';
  return out;
}
async function processScan(file){
  openSheet(`<h3>Reading your document…</h3>
    <div class="card pad" style="text-align:center;padding:30px 20px">
      <div class="glyph" style="font-family:var(--font-d);font-size:26px;color:var(--brass)">A</div>
      <p class="sub" id="ocrstat" style="margin-top:10px">Compressing image…</p>
      <div class="progress" style="margin-top:14px"><i id="ocrbar" style="width:8%"></i></div>
    </div>`);
  const dataURL=await compress(file);
  let parsed={ref:'',expires:'',category:'Other'}, text='';
  const stat=document.getElementById('ocrstat'), bar=document.getElementById('ocrbar');
  if(!window.__noOCR && window.Tesseract){
    try{
      if(stat) stat.textContent='Recognizing text…';
      const r=await Tesseract.recognize(dataURL,'eng',{logger:m=>{ if(m.status==='recognizing text'&&bar) bar.style.width=(15+m.progress*80)+'%'; }});
      text=r.data.text||''; parsed=parseDoc(text);
    }catch(e){ console.warn('OCR failed',e); }
  }
  let enc=null; try{ enc=await encryptBlob(dataURL); }catch(e){ console.warn('encrypt failed',e); }
  closeSheet();
  sheetDoc(null, {scan:enc, ocr:text.slice(0,4000), ...parsed});
}

/* ---------- value engine: savings ledger + renewal radar ---------- */
function ensureValue(){ if(!S.saves) S.saves=[]; }   // each: {amt, why, at}
function totalSaved(){ ensureValue(); return S.saves.reduce((a,s)=>a+Number(s.amt||0),0); }
function recordSave(amt, why){
  ensureValue(); if(!amt) return;
  S.saves.unshift({amt:Number(amt), why, at:Date.now()}); S.saves=S.saves.slice(0,100);
  log('Saved '+fmtMoney(amt)+' — '+why);
}
/* estimated annual cost of a subscription, used when one is cancelled */
function subAnnual(s){ return s.cycle==='Yearly'?Number(s.amount||0):Number(s.amount||0)*12; }

/* the radar: everything time-sensitive, scored by urgency, with the $ at stake */
function radar(){
  const out=[];
  const add=(label,date,goto,stake,kind)=>{ const d=daysUntil(date); if(d===null) return;
    out.push({label,date,days:d,goto,stake:stake||0,kind}); };
  S.home.forEach(x=>{ if(x.nextDue) add(x.item+' — service due', x.nextDue,'home',0,'maintenance');
                      if(x.warrantyUntil) add(x.item+' — warranty ends', x.warrantyUntil,'home',0,'warranty'); });
  S.vehicles.forEach(v=>{ if(v.insurance) add(v.name+' — insurance renews', v.insurance,'vehicles',0,'insurance');
                          if(v.registration) add(v.name+' — registration renews', v.registration,'vehicles',0,'registration'); });
  S.vault.forEach(d=>{ if(d.expires) add(d.title+' — expires', d.expires,'vault',0,'document'); });
  S.finance.bills.forEach(b=>{ if(b.dueDay){ const d=new Date(); let due=new Date(d.getFullYear(),d.getMonth(),Math.min(28,+b.dueDay||1));
    if(due<d) due=new Date(d.getFullYear(),d.getMonth()+1,Math.min(28,+b.dueDay||1));
    add(b.name+' — bill due', due.toISOString().slice(0,10),'finance',Number(b.amount||0),'bill'); }});
  S.finance.subs.forEach(s=>{ /* surface subs as review prompts (potential savings) */
    out.push({label:s.name+' — still using it?', date:null, days:9999, goto:'finance', stake:subAnnual(s), kind:'sub', sub:s}); });
  return out.sort((a,b)=>a.days-b.days);
}
function moneyAtRisk(){ return radar().filter(r=>r.days<=30 && r.kind==='bill').reduce((a,r)=>a+r.stake,0); }

function exportBackup(){
  const payload = {app:'AVENOR', schema:1, exportedAt:new Date().toISOString(), data:S};
  const blob = new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'avenor-backup-'+todayISO()+'.json';
  document.body.appendChild(a); a.click(); a.remove();
  setTimeout(()=>URL.revokeObjectURL(a.href), 4000);
  S.lastBackup = Date.now(); save(); render();
  toast('Backup downloaded');
}
function restoreBackup(input){
  const file = input.files && input.files[0]; if(!file) return;
  const reader = new FileReader();
  reader.onload = ()=>{
    try{
      const p = JSON.parse(reader.result);
      const d = p && p.app==='AVENOR' && p.data ? p.data : p; // accept raw state too
      if(!d || typeof d!=='object' || !('goals' in d) || !('projects' in d)) throw new Error('shape');
      if(!confirm('Replace everything on this device with this backup? This cannot be undone.')){ input.value=''; return; }
      S = Object.assign(blank(), d);
      S.finance = Object.assign({bills:[],subs:[],debts:[],assets:[]}, S.finance||{});
      save(); render(); toast('Backup restored');
    }catch(e){ toast('That file is not a valid AVENOR backup'); }
    input.value='';
  };
  reader.readAsText(file);
}
function eraseAll(){
  if(!confirm('Erase ALL AVENOR data on this device? Download a backup first if you want to keep anything.')) return;
  if(!confirm('Last check — this permanently deletes everything. Continue?')) return;
  S = blank(); save(); go('today'); render(); toast('Everything erased');
}

/* ================= CLOUD (Supabase + Stripe) ================= */
let sb=null, sbSession=null, sbProfile=null, pushTimer=null, syncState='off'; // off|idle|syncing|synced|error

function cloudConfigured(){
  return !window.__noSupabase && typeof window.supabase!=='undefined' && window.AVENOR_CONFIG &&
         AVENOR_CONFIG.SUPABASE_URL && AVENOR_CONFIG.SUPABASE_ANON_KEY;
}
function isPremium(){ return !!(sbProfile && (sbProfile.status==='active'||sbProfile.status==='trialing')); }
function countItems(st){ return st.goals.length+st.projects.length+st.home.length+st.vehicles.length+st.vault.length+st.family.length+st.finance.bills.length+st.finance.subs.length+st.finance.debts.length+st.finance.assets.length; }

async function cloudInit(){
  if(!cloudConfigured()) return;
  sb = window.supabase.createClient(AVENOR_CONFIG.SUPABASE_URL, AVENOR_CONFIG.SUPABASE_ANON_KEY);
  const { data:{ session } } = await sb.auth.getSession();
  sbSession = session;
  sb.auth.onAuthStateChange((_evt, s)=>{ const wasOut=!sbSession; sbSession=s; if(s && wasOut) afterLogin(); if(!s){ sbProfile=null; syncState='off'; render(); } });
  if(sbSession) await afterLogin(); else render();
}
async function afterLogin(){
  try{
    await refreshProfile();
    if(isPremium()) await firstSync();
  }catch(e){ console.error(e); }
  render();
}
async function refreshProfile(){
  if(!sb||!sbSession) return;
  const { data } = await sb.from('profiles').select('*').eq('id', sbSession.user.id).single();
  sbProfile = data || null;
}
async function firstSync(){
  syncState='syncing'; render();
  const { data, error } = await sb.from('user_state').select('data, updated_at').eq('user_id', sbSession.user.id).maybeSingle();
  if(error){ syncState='error'; render(); return; }
  if(!data){ await pushNow(); return; }                      // nothing in cloud yet → upload local
  if(!countItems(S)){                                         // this device is empty → pull cloud
    S = Object.assign(blank(), data.data);
    S.finance = Object.assign({bills:[],subs:[],assets:[],debts:[]}, S.finance||{});
    save(); syncState='synced'; render(); toast('Restored from cloud'); return;
  }
  // Both sides have data → let the user decide once
  openSheet(`<h3>Two versions found</h3>
    <p class="sub" style="margin:-6px 0 16px">This device and your cloud account both have AVENOR data. Which should win? The other is replaced.</p>
    <div class="actions" style="flex-direction:column">
      <button class="btn btn-ink" onclick="resolveSync('local')">Keep this device (${countItems(S)} items) → upload</button>
      <button class="btn btn-ghost" onclick="resolveSync('cloud')">Keep cloud (last synced ${new Date(data.updated_at).toLocaleDateString()}) → download</button>
    </div>`);
  window._cloudData = data.data;
}
async function resolveSync(which){
  closeSheet();
  if(which==='cloud'){
    S = Object.assign(blank(), window._cloudData||{});
    S.finance = Object.assign({bills:[],subs:[],assets:[],debts:[]}, S.finance||{});
    save(); syncState='synced'; render(); toast('Cloud version restored');
  } else { await pushNow(); toast('Device version uploaded'); }
  window._cloudData = null;
}
function schedulePush(){
  if(!sb||!sbSession||!isPremium()) return;
  syncState='syncing'; clearTimeout(pushTimer);
  pushTimer = setTimeout(pushNow, 1800);
}
async function pushNow(){
  if(!sb||!sbSession||!isPremium()) return;
  const { error } = await sb.from('user_state').upsert({
    user_id: sbSession.user.id, data: S, updated_at: new Date().toISOString()
  });
  syncState = error ? 'error' : 'synced';
  const el=document.getElementById('syncline'); if(el) el.textContent=syncLabel();
}
function syncLabel(){
  return {off:'Sync off', idle:'Sync ready', syncing:'Syncing…', synced:'All changes synced', error:'Sync error — will retry on next change'}[syncState];
}

function searchIndex(){
  const out=[];
  S.goals.forEach(g=>out.push({type:'Goal',label:g.title,sub:g.horizon,go:'goals'}));
  S.projects.forEach(p=>{ out.push({type:'Project',label:p.title,sub:(p.status||'Active'),go:'projects/'+p.id});
    (p.tasks||[]).forEach(t=>out.push({type:'Task',label:t.title,sub:p.title,go:'projects/'+p.id})); });
  S.home.forEach(x=>out.push({type:'Home',label:x.item,sub:x.category||'',go:'home'}));
  S.vehicles.forEach(v=>{ out.push({type:'Vehicle',label:v.name,sub:'',go:'vehicles'});
    (v.services||[]).forEach(s=>out.push({type:'Service',label:s.type,sub:v.name,go:'vehicles'})); });
  S.vault.forEach(d=>out.push({type:'Document',label:d.title,sub:d.category,go:'vault'}));
  S.family.forEach(f=>out.push({type:'Person',label:f.name,sub:f.relation||'',go:'family'}));
  S.finance.bills.forEach(b=>out.push({type:'Bill',label:b.name,sub:fmtMoney(b.amount),go:'finance'}));
  S.finance.subs.forEach(s=>out.push({type:'Subscription',label:s.name,sub:fmtMoney(s.amount),go:'finance'}));
  S.finance.debts.forEach(d=>out.push({type:'Debt',label:d.name,sub:fmtMoney(d.balance),go:'finance'}));
  S.finance.assets.forEach(a=>out.push({type:'Asset',label:a.name,sub:fmtMoney(a.value),go:'finance'}));
  return out;
}
function openSearch(){
  openSheet(`<h3>Search everything</h3>
  ${FLD('q','','text','','Search goals, tasks, documents, people…')}
  <div id="qres" style="margin-top:6px"></div>`);
  const inp=document.getElementById('q');
  inp.setAttribute('autocomplete','off');
  inp.oninput=()=>renderSearch(inp.value.trim().toLowerCase());
  renderSearch('');
}
function renderSearch(q){
  const box=document.getElementById('qres'); if(!box) return;
  if(!q){ box.innerHTML='<p class="sub" style="padding:14px 2px">Start typing to find anything across AVENOR.</p>'; return; }
  const hits=searchIndex().filter(x=>(x.label+' '+x.sub).toLowerCase().includes(q)).slice(0,12);
  if(!hits.length){ box.innerHTML='<p class="sub" style="padding:14px 2px">Nothing matches \u201c'+esc(q)+'\u201d yet.</p>'; return; }
  box.innerHTML='<div class="card rowlist">'+hits.map(x=>
    `<button class="row" style="width:100%;text-align:left" onclick="closeSheet();go('${x.go}')">
      <div class="grow"><div class="title">${esc(x.label)}</div><div class="meta">${x.sub?esc(x.sub):''}</div></div>
      <span class="chip">${x.type}</span></button>`).join('')+'</div>';
}

/* ---------- guided tour ---------- */
const TOUR=[
  {r:'today',t:'Your Life Dashboard',b:'Everything important surfaces here — your Life Pulse score, what\u2019s next, and renewals before they bite.'},
  {r:'goals',t:'Goals',b:'Set a vision across five horizons, from the next 30 days out to five years. Goals give your projects a reason to exist.'},
  {r:'projects',t:'Projects',b:'Turn a goal into motion. Each project holds its own tasks, budget and notes. Tap one to open it.'},
  {r:'vault',t:'Document Vault',b:'Passports, policies, contracts — with reference numbers and expiry dates one tap away, even offline.'},
  {r:'finance',t:'Finance',b:'Bills, subscriptions, debts and assets. See your monthly fixed costs and net position at a glance.'},
  {r:'settings',t:'Settings & Premium',b:'Back up your data, and under Account & Sync, start Premium to sync across all your devices. That\u2019s the subscription page.'},
  {r:'today',t:'One more thing',b:'The red Emergency button is always in reach. One tap shows critical contacts, medical info and your family plan.'}
];
let tourI=0;
function startTour(){ closeSheet(); tourI=0; showTour(); }
function showTour(){
  const step=TOUR[tourI]; if(!step) return endTour();
  go(step.r);
  setTimeout(()=>{
    let ov=document.getElementById('tour'); if(!ov){ ov=document.createElement('div'); ov.id='tour'; document.body.appendChild(ov); }
    ov.className='tourwrap';
    ov.innerHTML=`<div class="scrim show" style="z-index:100" onclick="endTour()"></div>
      <div class="tourcard">
        <span class="eyebrow">Tour · ${tourI+1} of ${TOUR.length}</span>
        <h3>${step.t}</h3><p>${step.b}</p>
        <div class="tourdots">${TOUR.map((_,i)=>`<i class="${i===tourI?'on':''}"></i>`).join('')}</div>
        <div class="touract">
          <button class="btn-quiet" onclick="endTour()">Skip</button>
          <button class="btn btn-ink" onclick="nextTour()">${tourI===TOUR.length-1?'Finish':'Next'}</button>
        </div>
      </div>`;
  }, 120);
}
function nextTour(){ tourI++; tourI<TOUR.length?showTour():endTour(); }
function endTour(){ const ov=document.getElementById('tour'); if(ov) ov.remove(); }

}

  renderNav();
  const r=route().split('/')[0];
  const v=document.getElementById('view');
  try { v.innerHTML=(V[r]||V.today)(); }
  catch(err){ console.error('view '+r+' failed', err); v.innerHTML='<div class="empty" style="padding:50px 20px"><div class="glyph">A</div><p>This screen hit an error. Your data is safe.</p><button class="btn btn-ghost" onclick="go(\'today\')">Back to dashboard</button></div>'; }
  v.classList.remove('view'); void v.offsetWidth; v.classList.add('view');
  closeSheet();
}
function init(){

}

try { cloudInit(); } catch(err){ console.warn('cloud unavailable', err); }

  window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').then(reg=>reg.update()).catch(()=>{}));
}
window.addEventListener('load', () => {

});
setTimeout(()=>document.getElementById('splash').classList.add('gone'), 2600); // failsafe
