1px solid rgba(255,255,255,.08);margin-top:7px\"><b style=\"color:#fff\">${esc(m.label)}<\u002Fb>${m.detail?' — '+esc(m.detail):''}<\u002Fdiv>`).join('')}${S.family.filter(f=>f.medical).map(f=>`<div style=\"padding:7px 0;border-top:1px solid rgba(255,255,255,.08);margin-top:7px\"><b style=\"color:#fff\">${esc(f.name)}:<\u002Fb> ${esc(f.medical)}<\u002Fdiv>`).join('')}<\u002Fdiv>`:''}\n      ${(S.insurance||[]).length||E.insurance?`<div class=\"emg-block\"><h4>Insurance<\u002Fh4>${(S.insurance||[]).map(p=>`<div style=\"display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.07)\"><span style=\"font-size:13.5px\">${esc(p.name)}<\u002Fspan><span style=\"font-family:var(--font-m);font-size:12px;color:rgba(255,200,150,.9)\">${esc(p.policy||'')}<\u002Fspan><\u002Fdiv>`).join('')}${E.insurance&&!S.insurance.length?`<p style=\"font-size:14px;color:rgba(255,255,255,.85);line-height:1.65\">${esc(E.insurance)}<\u002Fp>`:''}<\u002Fdiv>`:''}\n      ${E.plan?`<div class=\"emg-block\"><h4>Family plan<\u002Fh4><p style=\"font-size:14px;color:rgba(255,255,255,.85);line-height:1.7;white-space:pre-wrap\">${esc(E.plan)}<\u002Fp><\u002Fdiv>`:''}\n      <button class=\"emg-edit\" onclick=\"closeEmergency();sheetEmergency()\">Edit emergency information<\u002Fbutton>\n      <button class=\"emg-close\" onclick=\"closeEmergency()\">Close emergency mode<\u002Fbutton>`;\n      document.getElementById('emg').classList.add('show');\n    }\n    function closeEmergency(){document.getElementById('emg').classList.remove('show');}\n    function sheetEmergency(){const E=S.emergency;openSheet(`<h3>Emergency information<\u002Fh3><div class=\"field\"><label for=\"e_m\">Medical (you)<\u002Flabel><textarea id=\"e_m\" placeholder=\"Blood type, allergies, conditions, medications\">${esc(E.medical)}<\u002Ftextarea><\u002Fdiv><div class=\"field\"><label for=\"e_i\">Insurance<\u002Flabel><textarea id=\"e_i\" placeholder=\"Health policy #, auto policy #\">${esc(E.insurance)}<\u002Ftextarea><\u002Fdiv><div class=\"field\"><label for=\"e_p\">Family plan<\u002Flabel><textarea id=\"e_p\" placeholder=\"Meeting point, out-of-town contact\">${esc(E.plan)}<\u002Ftextarea><\u002Fdiv>${ACTIONS('saveEmergency()')}`);}\n    function saveEmergency(){S.emergency={medical:document.getElementById('e_m').value.trim(),insurance:document.getElementById('e_i').value.trim(),plan:document.getElementById('e_p').value.trim()};save();closeSheet();toast('Emergency info updated');}\n\n    // ---- TOUR ----\n    const TOUR=[{r:'today',t:'Your Life Dashboard',b:'Life Pulse and what needs you today — surfaced the moment you open the app.'},{r:'goals',t:'Goals',b:'Set a vision across five horizons, from 30 days out to five years.'},{r:'projects',t:'Projects',b:'Turn a goal into motion. Each project holds its own tasks, budget and notes.'},{r:'vault',t:'Document Vault',b:'Passports, policies, contracts — with expiry dates one tap away, even offline.'},{r:'finance',t:'Finance Center',b:'Bills, subscriptions, debts and assets. See your monthly fixed cost at a glance.'},{r:'settings',t:'Settings & Premium',b:'Back up your data, and start Premium to sync across all your devices.'},{r:'today',t:'One more thing',b:'The red Emergency button is always in reach — contacts, medical info and your family plan, instantly.'}];\n    let tourI=0;\n    function startTour(){closeSheet();tourI=0;showTour();}\n    function showTour(){\n      const step=TOUR[tourI];if(!step)return endTour();\n      go(step.r);\n      setTimeout(()=>{let ov=document.getElementById('tour');if(!ov){ov=document.createElement('div');ov.id='tour';ov.style.cssText='position:fixed;inset:0;z-index:101';document.body.appendChild(ov);}\n      ov.innerHTML=`<div class=\"scrim show\" style=\"z-index:100\" onclick=\"endTour()\"><\u002Fdiv><div class=\"tourcard\"><span class=\"eyebrow\">Tour · ${tourI+1} of ${TOUR.length}<\u002Fspan><h3>${step.t}<\u002Fh3><p>${step.b}<\u002Fp><div class=\"tourdots\">${TOUR.map((_,i)=>`<i class=\"${i===tourI?'on':''}\"><\u002Fi>`).join('')}<\u002Fdiv><div class=\"touract\"><button class=\"btn-quiet\" onclick=\"endTour()\">Skip<\u002Fbutton><button class=\"btn btn-ink\" onclick=\"nextTour()\">${tourI===TOUR.length-1?'Finish':'Next'}<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;},120);\n    }\n    function nextTour(){tourI++;tourI<TOUR.length?showTour():endTour();}\n    function endTour(){const ov=document.getElementById('tour');if(ov)ov.remove();}\n\n    // ---- FAB ----\n    function fabAction(){\n      const r=route().split('/')[0];\n      const map={vault:startScan,insurance:sheetInsurance,medical:sheetMedical,legacy:sheetLegacyContact,goals:sheetGoal,projects:()=>{const sub=route().split('/')[1];sub?sheetTask(sub):sheetProject();},home:sheetHome,vehicles:sheetVehicle,family:sheetPerson,finance:sheetBill,watch:sheetBill};\n      (map[r]||sheetProject)();\n    }\n\n    // ---- ONBOARDING ----\n    let obSelectedStart=null;\n    function obShowStep(n){document.querySelectorAll('.ob-step').forEach((el,i)=>{el.classList.toggle('active',i===n);el.style.display=i===n?'flex':'none';});}\n    function obNext(){const active=[...document.querySelectorAll('.ob-step')].findIndex(el=>el.classList.contains('active'));if(active===1){const n=document.getElementById('ob-name')?.value?.trim();if(n)S.profile.name=n;}if(active<3)obShowStep(active+1);setTimeout(()=>{const inp=document.getElementById('ob-name');if(inp)inp.focus();},100);}\n    function obSelect(el,r){obSelectedStart=r;document.querySelectorAll('.ob-card').forEach(c=>c.classList.remove('sel'));el.classList.add('sel');}\n    function obFinish(){S.onboarded=1;save();const ov=document.getElementById('onboard');if(ov){ov.style.transition='opacity .4s var(--ease)';ov.style.opacity='0';setTimeout(()=>{ov.style.display='none';ov.style.opacity='';},440);}render();go(obSelectedStart||'today');toast('Welcome to Keptly'+(S.profile.name?', '+S.profile.name:'')+'! 🎉');}\n    function obSample(){S.onboarded=1;obFinish();setTimeout(()=>loadSample(),200);}\n\n    // ---- RENDER ----\n    function render(){\n      renderNav();\n      updateNature(route().split('/')[0]);\n      const r=route().split('/')[0], v=document.getElementById('view');\n      const prevIdx=SCREEN_ORDER.indexOf(prevRoute.split('/')[0]);\n      const currIdx=SCREEN_ORDER.indexOf(r);\n      const dir=currIdx>=prevIdx?'view-r':'view-l';\n      try{v.innerHTML=(V[r]||V.today)();}\n      catch(err){console.error('view '+r,err);v.innerHTML='<div class=\"empty\" style=\"padding:60px 20px\"><div class=\"glyph\">!<\u002Fdiv><p>Something went wrong. Your data is safe.<\u002Fp><button class=\"btn btn-ink\" onclick=\"go(\\'today\\')\">Back<\u002Fbutton><\u002Fdiv>';}\n      v.className=dir; void v.offsetWidth;\n      closeSheet();\n      if(r==='today') requestAnimationFrame(()=>animateGauge(pulse().score));\n    }\n\n    // ---- INIT ----\n    function init(){\n      if(!S.onboarded){const ov=document.getElementById('onboard');if(ov){ov.style.display='flex';obShowStep(0);}}\n      render();\n    }\n\n    // ---- EXPOSE ----\n    Object.assign(window,{\n      go,render,closeSheet,openSheet,openEmergency,closeEmergency,fabAction,\n      toggleTask,sheetGoal,saveGoal,sheetProject,saveProject,sheetTask,saveTask,\n      sheetHome,saveHome,sheetVehicle,saveVehicle,sheetService,saveService,\n      sheetDoc,saveDoc,viewScan,startScan,dropAnything,doUnlock,lockVault,sheetUnlock,\n      sheetPerson,savePerson,sheetInsurance,saveInsurance,sheetMedical,saveMedical,\n      sheetLegacyText,sheetLegacyContact,saveLegacyContact,delLegacyContact,\n      sheetBill,saveBill,sheetSub,saveSub,sheetDebt,saveDebt,sheetAsset,saveAsset,\n      delItem,cancelSub,exportBackup,restoreBackup,eraseAll,sheetProfile,saveProfile,\n      sheetPulse,sheetEmergency,saveEmergency,startCheckout,openPortal,signOut,\n      sheetSignIn,sendCode,verifyCode,resolveSync,openSearch,renderSearch,\n      startTour,nextTour,endTour,loadSample,obNext,obSelect,obFinish,obSample\n    });\n\n    // ---- NATURE MODE ----\n    const NATURE={\n      today:    {a:'#2C1606',b:'#441E0A',c:'#1C0E04',p:[255,195,80],name:'Golden Hour'},\n      watch:    {a:'#062C22',b:'#0C4033',c:'#051E18',p:[68,225,195],name:'Warm Lagoon'},\n      goals:    {a:'#1E1030',b:'#301848',c:'#160C24',p:[215,148,255],name:'Sunrise Peak'},\n      projects: {a:'#0E2406',b:'#1A360A',c:'#0A1C04',p:[128,218,58],name:'Forest Canopy'},\n      vault:    {a:'#062C28',b:'#0A4038',c:'#041E1C',p:[80,228,210],name:'Crystal Cave'},\n      finance:  {a:'#2C0C04',b:'#441408',c:'#1E0802',p:[255,120,40],name:'Autumn Harvest'},\n      home:     {a:'#2C0A1A',b:'#40122A',c:'#1E0812',p:[255,158,212],name:'Blossom Garden'},\n      vehicles: {a:'#0C0828',b:'#14103E',c:'#08061C',p:[155,138,255],name:'Night Drive'},\n      insurance:{a:'#0A2C24',b:'#124038',c:'#081E1A',p:[85,228,200],name:'Still Harbor'},\n      medical:  {a:'#0C3026',b:'#18443A',c:'#0A2218',p:[70,232,180],name:'Hot Spring'},\n      family:   {a:'#1A0C2C',b:'#281640',c:'#120820',p:[255,208,105],name:'Twilight Garden'},\n      legacy:   {a:'#100E2C',b:'#181640',c:'#0C0C1E',p:[198,188,255],name:'Stargazing'},\n      settings: {a:'#062C22',b:'#0C4033',c:'#051E18',p:[68,225,195],name:'Warm Lagoon'},\n      trust:    {a:'#0C3026',b:'#18443A',c:'#0A2218',p:[70,232,180],name:'Hot Spring'},\n    };\n    let natureOn=false,natureRAF=null,natureMouse={x:.5,y:.5},parts=[];\n\n    function updateNature(r){\n      if(!natureOn) return;\n      // Flush per-scene particle caches (leaves, stars, petals…) so new scene starts fresh\n      const keep=['bursts'];\n      Object.keys(_ns).forEach(k=>{ if(!keep.includes(k)) delete _ns[k]; });\n      const th=NATURE[r]||NATURE.today;\n      const layer=document.getElementById('nature-layer');\n      if(!layer) return;\n      const px=(natureMouse.x-.5)*20, py=(natureMouse.y-.5)*14;\n      layer.style.background=`linear-gradient(168deg,${th.a},${th.b} 55%,${th.c})`;\n      layer.style.transform=`translate(${px}px,${py}px) scale(1.07)`;\n    }\n\n    // ---- NATURE SCENE RENDERERS ----\n    const _ns={};  // per-scene state cache\n\n    function drawOcean(ctx,W,H,t){\n      const opx=(natureMouse.x-.5)*24;\n      // Wave layers\n      for(let l=4;l>=0;l--){\n        const amp=10+l*14,freq=0.006+l*0.0015,spd=0.45+l*0.22,yBase=H*(.72-l*.04);\n        ctx.beginPath();\n        for(let x=0;x<=W+4;x+=4){\n          const wx=x-opx*(l*.25+.1);\n          const y=yBase+Math.sin(wx*freq+t*spd+l*.7)*amp+Math.sin(wx*freq*2.1-t*spd*.6)*amp*.35;\n          x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);\n        }\n        ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();\n        const g=ctx.createLinearGradient(0,yBase-amp,0,H);\n        g.addColorStop(0,`rgba(15,165,148,${.06+l*.038})`);\n        g.addColorStop(.5,`rgba(8,100,90,${.09+l*.042})`);\n        g.addColorStop(1,`rgba(5,55,50,${.13+l*.05})`);\n        ctx.fillStyle=g;ctx.fill();\n      }\n      // Foam specks at crest\n      for(let i=0;i<48;i++){\n        const x=(i/48)*W;\n        const y=H*.72+Math.sin(x*.006+t*.5)*22+Math.sin(x*.013-t*.35)*9;\n        const p=.5+.5*Math.sin(t*3+i);\n        ctx.beginPath();ctx.arc(x+Math.sin(t+i)*3,y-3,1.2+p*.8,0,Math.PI*2);\n        ctx.fillStyle=`rgba(180,242,228,${.08+p*.08})`;ctx.fill();\n      }\n      // Sunlight shimmer on water\n      const mx=W*.55;\n      for(let i=0;i<16;i++){\n        const sx=mx+(Math.sin(t*.7+i*1.3))*38;\n        const sy=H*.68+i*12+Math.sin(t*1.2+i*.5)*7;\n        if(sy<H){\n          const a=(.055-i*.003)*(.6+.4*Math.sin(t*1.5+i));\n          if(a>0){ctx.fillStyle=`rgba(180,248,230,${a})`;ctx.fillRect(sx,sy,3+Math.sin(i)*2,1);}\n        }\n      }\n    }\n\n    function drawForest(ctx,W,H,t){\n      if(!_ns.leaves) _ns.leaves=Array.from({length:22},()=>({x:Math.random(),y:Math.random(),s:3+Math.random()*5,r:Math.random()*Math.PI*2,vy:.0003+Math.random()*.0005,vx:(Math.random()-.5)*.0003,sp:(Math.random()-.5)*.035,h:80+Math.floor(Math.random()*2)*40}));\n      // Golden light shafts through canopy — parallax\n      const fpx=(natureMouse.x-.5)*18;\n      for(let i=0;i<5;i++){\n        const sx=(.1+i*.2+Math.sin(t*.06+i*.9)*.015)*W + fpx;\n        const bw=28+Math.sin(t*.09+i)*8;\n        const ga=ctx.createLinearGradient(sx,0,sx,H*.85);\n        const intensity=.028+.012*Math.sin(t*.14+i*.7);\n        ga.addColorStop(0,`rgba(255,210,90,0)`);\n        ga.addColorStop(.15,`rgba(255,200,75,${intensity})`);\n        ga.addColorStop(.55,`rgba(255,185,60,${intensity*.7})`);\n        ga.addColorStop(1,`rgba(255,170,50,0)`);\n        ctx.fillStyle=ga;\n        ctx.save();ctx.globalAlpha=1;\n        ctx.beginPath();ctx.moveTo(sx-bw*.4,0);ctx.lineTo(sx+bw*.4,0);\n        ctx.lineTo(sx+bw,H*.85);ctx.lineTo(sx-bw,H*.85);ctx.closePath();\n        ctx.fillStyle=ga;ctx.fill();ctx.restore();\n      }\n      // Tree silhouettes\n      const tc=Math.ceil(W/55);\n      for(let i=0;i<tc;i++){\n        const tx=(i/tc)*W+28,th2=H*(.28+Math.sin(i*1.7)*.1),tw=22+Math.sin(i*2.3)*10;\n        const sw=Math.sin(t*.35+i*.8)*3.5;\n        ctx.fillStyle='rgba(8,20,8,0.22)';ctx.fillRect(tx-2.5+sw*.3,H-th2*.28,5,th2*.28);\n        for(let ly=0;ly<3;ly++){\n          const lyo=H-th2+ly*th2*.24,lw=tw*(1.15-ly*.18);\n          ctx.beginPath();ctx.moveTo(tx+sw,lyo);\n          ctx.lineTo(tx-lw+sw*.6,H-th2*.22+ly*th2*.21);ctx.lineTo(tx+lw+sw*.6,H-th2*.22+ly*th2*.21);\n          ctx.closePath();ctx.fillStyle=`rgba(12,${30+ly*7},12,${.17+ly*.05})`;ctx.fill();\n        }\n      }\n      // Falling leaves\n      _ns.leaves.forEach(l=>{\n        l.y+=l.vy;l.x+=l.vx+Math.sin(t*.5+l.r)*.00018;l.r+=l.sp;\n        if(l.y>1.02){l.y=-0.02;l.x=Math.random();}\n        if(l.x<0)l.x=1;if(l.x>1)l.x=0;\n        ctx.save();ctx.translate(l.x*W,l.y*H);ctx.rotate(l.r);\n        ctx.beginPath();ctx.ellipse(0,0,l.s,l.s*.55,0,0,Math.PI*2);\n        ctx.fillStyle=`rgba(${l.h},${160+Math.sin(l.r)*22},55,0.2)`;ctx.fill();\n        ctx.restore();\n      });\n      // Fireflies\n      for(let i=0;i<9;i++){\n        const fx=(.08+(i/9)*.84+Math.sin(t*.28+i)*.04)*W + fpx*.5;\n        const fy=(.38+Math.sin(t*.45+i*1.25)*.14)*H + (natureMouse.y-.5)*8;\n        const glow=.5+.5*Math.sin(t*2.4+i*1.1);\n        const g=ctx.createRadialGradient(fx,fy,0,fx,fy,9);\n        g.addColorStop(0,`rgba(160,255,130,${glow*.2})`);g.addColorStop(1,'rgba(0,0,0,0)');\n        ctx.fillStyle=g;ctx.beginPath();ctx.arc(fx,fy,11,0,Math.PI*2);ctx.fill();\n        ctx.beginPath();ctx.arc(fx,fy,1.6,0,Math.PI*2);\n        ctx.fillStyle=`rgba(190,255,150,${glow*.65})`;ctx.fill();\n      }\n    }\n\n    function drawDawn(ctx,W,H,t){\n      const px=(natureMouse.x-.5)*22,py=(natureMouse.y-.5)*12;\n      const sunX=W*.5+px, sunY=H*.58+py;\n      // Sun glow — vivid layered radial\n      const g=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,W*.72);\n      g.addColorStop(0,'rgba(255,210,80,0.22)');g.addColorStop(.22,'rgba(255,140,40,0.10)');\n      g.addColorStop(.5,'rgba(220,60,15,0.04)');g.addColorStop(1,'rgba(0,0,0,0)');\n      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);\n      // Inner corona\n      const gc=ctx.createRadialGradient(sunX,sunY,0,sunX,sunY,W*.18);\n      gc.addColorStop(0,'rgba(255,230,140,0.18)');gc.addColorStop(1,'rgba(255,180,60,0)');\n      ctx.fillStyle=gc;ctx.fillRect(0,0,W,H);\n      // Light rays — 9, wider, brighter\n      for(let r=0;r<9;r++){\n        const ang=-Math.PI*.5+(r-4)*0.19+Math.sin(t*.16+r)*.05;\n        const rl=H*1.5,a=(.032+.012*Math.sin(t*.38+r))*(1-Math.abs(r-4)*.09);\n        ctx.beginPath();ctx.moveTo(sunX,sunY);\n        ctx.lineTo(sunX+Math.cos(ang)*rl,sunY+Math.sin(ang)*rl);\n        ctx.lineTo(sunX+Math.cos(ang+.065)*rl,sunY+Math.sin(ang+.065)*rl);\n        ctx.closePath();ctx.fillStyle=`rgba(255,200,80,${a})`;ctx.fill();\n      }\n      // Birds — flock of 9 in loose V\n      for(let b=0;b<9;b++){\n        const bx=((t*.036+b*.155)%1.45-.12)*W + px*.25;\n        const by=(.14+b*.042+Math.sin(t*.26+b)*.022)*H;\n        const flap=Math.sin(t*4.2+b*1.3)*5;\n        const a=.18+.08*Math.sin(t*.5+b);\n        ctx.beginPath();ctx.moveTo(bx-11,by+flap);ctx.quadraticCurveTo(bx,by-7,bx+11,by+flap);\n        ctx.strokeStyle=`rgba(255,195,85,${a})`;ctx.lineWidth=1.4;ctx.stroke();\n      }\n      // Horizon glow band\n      const m=ctx.createLinearGradient(0,sunY-20,0,sunY+80);\n      m.addColorStop(0,'rgba(255,155,55,0)');m.addColorStop(.45,'rgba(255,200,115,0.085)');m.addColorStop(1,'rgba(255,120,40,0)');\n      ctx.fillStyle=m;ctx.fillRect(0,sunY-20,W,100);\n    }\n\n    function drawCosmos(ctx,W,H,t){\n      if(!_ns.stars) _ns.stars=Array.from({length:110},()=>({x:Math.random(),y:Math.random(),s:.3+Math.random()*2.2,ph:Math.random()*Math.PI*2,sp:.3+Math.random()*1.2,layer:Math.random()}));\n      const cpx=(natureMouse.x-.5)*28, cpy=(natureMouse.y-.5)*14;\n      _ns.stars.forEach(s=>{\n        const p=.4+.6*Math.sin(t*s.sp+s.ph);\n        const lx=cpx*s.layer, ly=cpy*s.layer*.6; // near stars shift more\n        const warm=s.ph>Math.PI;\n        ctx.beginPath();ctx.arc(s.x*W+lx,s.y*H+ly,s.s*p,0,Math.PI*2);\n        ctx.fillStyle=warm?`rgba(255,240,210,${p*.30})`:`rgba(210,200,255,${p*.34})`;ctx.fill();\n        // Brighter star has a tiny halo\n        if(s.s>1.6){\n          ctx.beginPath();ctx.arc(s.x*W+lx,s.y*H+ly,s.s*p*2.8,0,Math.PI*2);\n          ctx.fillStyle=warm?`rgba(255,240,210,${p*.06})`:`rgba(200,190,255,${p*.07})`;ctx.fill();\n        }\n      });\n      // Rich vivid nebula — shifted slightly by mouse\n      [[.2,.22,200,120,248],[.55,.16,168,95,235],[.76,.32,215,140,252],[.38,.10,185,105,242]].forEach(([nx,ny,r,g,b],i)=>{\n        const nx2=nx*W+cpx*.12, ny2=ny*H+cpy*.08;\n        const grd=ctx.createRadialGradient(nx2,ny2,0,nx2,ny2,W*.22);\n        grd.addColorStop(0,`rgba(${r},${g},${b},0.075)`);grd.addColorStop(.5,`rgba(${r},${g},${b},0.028)`);grd.addColorStop(1,'rgba(0,0,0,0)');\n        ctx.fillStyle=grd;ctx.beginPath();ctx.arc(nx2,ny2,W*.22,0,Math.PI*2);ctx.fill();\n      });\n      // Warm amber shooting star\n      const st=t%9;\n      if(st<1.8){\n        const p=Math.sin(st*Math.PI/1.8);\n        const sx=st/1.8*W*.75+W*.12,sy=st/1.8*H*.38+H*.06,tail=70*p;\n        const sg=ctx.createLinearGradient(sx-tail,sy-tail*.45,sx,sy);\n        sg.addColorStop(0,'rgba(255,240,200,0)');sg.addColorStop(1,`rgba(255,240,200,${p*.32})`);\n        ctx.beginPath();ctx.moveTo(sx-tail,sy-tail*.45);ctx.lineTo(sx,sy);\n        ctx.strokeStyle=sg;ctx.lineWidth=1.5;ctx.stroke();\n        ctx.beginPath();ctx.arc(sx,sy,1.8*p,0,Math.PI*2);\n        ctx.fillStyle=`rgba(255,245,210,${p*.45})`;ctx.fill();\n      }\n    }\n\n    function drawGarden(ctx,W,H,t){\n      if(!_ns.petals) _ns.petals=Array.from({length:24},()=>({x:Math.random(),y:Math.random(),s:4+Math.random()*8,r:Math.random()*Math.PI*2,vy:.00020+Math.random()*.00036,vx:(Math.random()-.5)*.00020,sp:(Math.random()-.5)*.026,h:295+Math.random()*65}));\n      _ns.petals.forEach(p=>{\n        p.y+=p.vy;p.x+=p.vx+Math.sin(t*.55+p.r)*.00018;p.r+=p.sp;\n        if(p.y>1.02){p.y=-0.02;p.x=Math.random();}\n        ctx.save();ctx.translate(p.x*W,p.y*H);ctx.rotate(p.r);\n        ctx.beginPath();ctx.moveTo(0,-p.s);\n        ctx.bezierCurveTo(p.s*.55,-p.s*.55,p.s*.55,p.s*.55,0,p.s);\n        ctx.bezierCurveTo(-p.s*.55,p.s*.55,-p.s*.55,-p.s*.55,0,-p.s);\n        ctx.fillStyle=`hsla(${p.h},72%,85%,0.20)`;ctx.fill();ctx.restore();\n      });\n      for(let i=0;i<10;i++){\n        const bx=(.06+i*.1+Math.sin(t*.18+i)*.02)*W,by=(.38+Math.sin(t*.28+i*.9)*.14)*H;\n        const r2=18+Math.sin(t*.7+i)*5,pulse=.5+.5*Math.sin(t*1.4+i*.7);\n        const g=ctx.createRadialGradient(bx,by,0,bx,by,r2);\n        g.addColorStop(0,`hsla(${310+i*6},68%,82%,${pulse*.11})`);g.addColorStop(1,'hsla(0,0%,0%,0)');\n        ctx.fillStyle=g;ctx.beginPath();ctx.arc(bx,by,r2,0,Math.PI*2);ctx.fill();\n      }\n    }\n\n    function drawMountain(ctx,W,H,t){\n      const mpx=(natureMouse.x-.5)*20, mpy=(natureMouse.y-.5)*8;\n      const peaks=[[0,.68],[.12,.36],[.26,.54],[.4,.3],[.52,.5],[.65,.37],[.78,.52],[.88,.41],[1,.64]];\n      [.085,.055,.03].forEach((alpha,li)=>{\n        const par=Math.sin(t*.04+li)*2*(li+1)+mpx*(li*.6+.3);\n        ctx.beginPath();ctx.moveTo(-40,H);\n        peaks.forEach(([px,py])=>ctx.lineTo(px*W+par,H*(py*.95+.32)+mpy*(li+1)*.4));\n        ctx.lineTo(W+40,H);ctx.closePath();\n        ctx.fillStyle=`rgba(28,18,55,${alpha+li*.04})`;ctx.fill();\n      });\n      // Vivid sunrise aurora — rose, amber, lavender — shifts with mouse\n      [[.18,245,120,165],[.3,205,100,245],[.42,255,160,105]].forEach(([y,r,g,b],i)=>{\n        const ay=(y+Math.sin(t*.12+i)*.04)*H+mpy*.5;\n        const grd=ctx.createLinearGradient(0,ay-36,0,ay+36);\n        grd.addColorStop(0,`rgba(${r},${g},${b},0)`);\n        grd.addColorStop(.5,`rgba(${r},${g},${b},${.055+.025*Math.sin(t*.32+i)})`);\n        grd.addColorStop(1,`rgba(${r},${g},${b},0)`);\n        ctx.fillStyle=grd;ctx.fillRect(0,ay-36,W,72);\n      });\n      for(let i=0;i<35;i++){\n        const sx=((i*.137+.05)%1)*W,sy=((i*.071+.02)%.32)*H;\n        const p=.3+.7*Math.sin(t*(.5+i*.09)+i);\n        ctx.beginPath();ctx.arc(sx,sy,.7+p*.7,0,Math.PI*2);\n        ctx.fillStyle=`rgba(200,210,255,${p*.26})`;ctx.fill();\n      }\n    }\n\n    function drawSpring(ctx,W,H,t){\n      if(!_ns.ripples) _ns.ripples=Array.from({length:5},(_,i)=>({x:.15+i*.18,y:.55+Math.random()*.25,born:i*1.8}));\n      // Ripples\n      _ns.ripples.forEach(r=>{\n        const age=(t-r.born+20)%4;\n        const maxR=W*.12,radius=maxR*(age/4),alpha=.12*(1-age/4);\n        if(alpha>0.005){\n          ctx.beginPath();ctx.arc(r.x*W,r.y*H,radius,0,Math.PI*2);\n          ctx.strokeStyle=`rgba(80,215,195,${alpha})`;ctx.lineWidth=1.5;ctx.stroke();\n          ctx.beginPath();ctx.arc(r.x*W,r.y*H,radius*.6,0,Math.PI*2);\n          ctx.strokeStyle=`rgba(80,220,210,${alpha*.6})`;ctx.lineWidth=1;ctx.stroke();\n        }\n        if(age>3.8) r.born=t;\n      });\n      // Dragonflies\n      for(let i=0;i<4;i++){\n        const fx=(.1+((t*.025+i*.28)%1)*.8)*W,fy=(.3+Math.sin(t*.4+i*1.1)*.08)*H;\n        const buzz=Math.sin(t*12+i)*.5;\n        ctx.save();ctx.translate(fx,fy);\n        ctx.strokeStyle=`rgba(60,200,180,0.22)`;ctx.lineWidth=1;\n        // wings\n        [[-1,1],[1,1],[-1,-1],[1,-1]].forEach(([sx,sy])=>{\n          ctx.beginPath();ctx.ellipse(sx*6,sy*3+buzz,5,2.5,sx*.4,0,Math.PI*2);\n          ctx.strokeStyle=`rgba(120,220,200,0.18)`;ctx.stroke();\n        });\n        ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(6,0);ctx.strokeStyle=`rgba(40,180,160,0.3)`;ctx.stroke();\n        ctx.restore();\n      }\n    }\n\n    function drawStorm(ctx,W,H,t){\n      if(!_ns.rain) _ns.rain=Array.from({length:50},()=>({x:Math.random(),y:Math.random(),len:8+Math.random()*12,speed:.003+Math.random()*.005,op:.04+Math.random()*.08}));\n      _ns.rain.forEach(r=>{\n        r.y+=r.speed;r.x+=r.speed*.3;\n        if(r.y>1.02){r.y=-0.02;r.x=Math.random();}\n        ctx.beginPath();ctx.moveTo(r.x*W,r.y*H);ctx.lineTo(r.x*W+r.len*.25,r.y*H+r.len);\n        ctx.strokeStyle=`rgba(140,160,200,${r.op})`;ctx.lineWidth=.8;ctx.stroke();\n      });\n      // Lightning flicker\n      const lp=t%7;\n      if(lp<.06||( lp>3&&lp<3.03)){\n        ctx.fillStyle=`rgba(200,210,255,${.04*(lp<.06?1-lp/.06:1-(lp-3)/.03)})`;\n        ctx.fillRect(0,0,W,H);\n      }\n    }\n\n    function drawCave(ctx,W,H,t){\n      if(!_ns.dust) _ns.dust=Array.from({length:28},()=>({x:Math.random(),y:Math.random(),s:.6+Math.random()*2.2,vy:-.00005+Math.random()*.00010,vx:(Math.random()-.5)*.00005,ph:Math.random()*Math.PI*2}));\n      const cpx2=(natureMouse.x-.5)*14;\n      const th3=NATURE[route().split('/')[0]]||NATURE.vault;\n      const [dr,dg,db]=th3.p;\n      _ns.dust.forEach(d=>{\n        d.y+=d.vy;d.x+=d.vx+Math.sin(t*.3+d.ph)*.00004;\n        if(d.y<-.02)d.y=1.02;if(d.y>1.02)d.y=-0.02;\n        const p=.07+.05*Math.sin(t*.6+d.ph);\n        const dx=d.x*W+cpx2*d.s*.3;\n        ctx.beginPath();ctx.arc(dx,d.y*H,d.s,0,Math.PI*2);\n        ctx.fillStyle=`rgba(${dr},${dg},${db},${p})`;ctx.fill();\n        // Glow halo on larger motes\n        if(d.s>1.8){\n          ctx.beginPath();ctx.arc(dx,d.y*H,d.s*3,0,Math.PI*2);\n          ctx.fillStyle=`rgba(${dr},${dg},${db},${p*.18})`;ctx.fill();\n        }\n      });\n    }\n\n    function drawEarth(ctx,W,H,t){\n      if(!_ns.embers) _ns.embers=Array.from({length:18},()=>({x:Math.random(),y:.7+Math.random()*.3,vy:-.0004+Math.random()*.0008,vx:(Math.random()-.5)*.0002,life:Math.random(),ph:Math.random()*Math.PI*2}));\n      _ns.embers.forEach(e=>{\n        e.y+=e.vy;e.x+=e.vx+Math.sin(t*.5+e.ph)*.0001;e.life-=.002;\n        if(e.y<-.05||e.life<=0){e.y=.75+Math.random()*.25;e.x=Math.random();e.life=.8+Math.random()*.4;}\n        const p=e.life*(.5+.5*Math.sin(t*3+e.ph));\n        ctx.beginPath();ctx.arc(e.x*W,e.y*H,.8+e.life*1.5,0,Math.PI*2);\n        ctx.fillStyle=`rgba(255,${148+e.life*70},40,${p*.28})`;ctx.fill();\n      });\n    }\n\n    const SCENE_FN={\n      today:    drawDawn,       // Golden Hour — warm amber rays, birds\n      watch:    drawOcean,      // Warm Lagoon — teal waves, sunlit shimmer\n      goals:    drawMountain,   // Sunrise Peak — rose aurora, warm stars\n      projects: drawForest,     // Forest Canopy — golden shafts, fireflies\n      vault:    drawCave,       // Crystal Cave — warm amber dust motes\n      finance:  drawEarth,      // Autumn Harvest — warm ember sparks\n      home:     drawGarden,     // Blossom Garden — rose petals, bloom glow\n      vehicles: drawCosmos,     // Night Drive — indigo star canopy\n      insurance:drawSpring,     // Still Harbor — gentle teal ripples\n      medical:  drawSpring,     // Hot Spring — healing ripple circles\n      family:   drawGarden,     // Twilight Garden — petals + firefly glow\n      legacy:   drawCosmos,     // Stargazing — warm violet nebula, amber stars\n      settings: drawOcean,      // Calm Lagoon — peaceful teal waves\n      trust:    drawSpring,     // Spring Renewal — soft ripples\n    };\n\n    function initScene(){\n      const c=document.getElementById('nature-canvas');\n      if(!c) return;\n      c.width=window.innerWidth;c.height=window.innerHeight;\n      // Clear scene state cache for fresh init\n      Object.keys(_ns).forEach(k=>delete _ns[k]);\n    }\n\n    function animNature(){\n      const c=document.getElementById('nature-canvas');\n      if(!c||!natureOn){natureRAF=null;return;}\n      _lastNatureFrame=Date.now();\n      try{\n        const ctx=c.getContext('2d');\n        ctx.clearRect(0,0,c.width,c.height);\n        const r=route().split('/')[0];\n        const fn=SCENE_FN[r]||drawDawn;\n        try{fn(ctx,c.width,c.height,Date.now()*.001);}catch(e){console.warn('nature draw err',e);}\n        // Click burst particles\n        if(_ns.bursts&&_ns.bursts.length){\n          const th2=NATURE[r]||NATURE.today;\n          const [pr,pg,pb]=th2.p;\n          _ns.bursts=_ns.bursts.filter(b=>{\n            b.x+=b.vx*.0009;b.y+=b.vy*.0009;b.life-=.018;\n            if(b.life<=0)return false;\n            try{\n              ctx.beginPath();ctx.arc(b.x*c.width,b.y*c.height,3*b.life,0,Math.PI*2);\n              ctx.fillStyle=`rgba(${pr},${pg},${pb},${b.life*.55})`;ctx.fill();\n              ctx.beginPath();ctx.arc(b.x*c.width,b.y*c.height,6*b.life,0,Math.PI*2);\n              ctx.strokeStyle=`rgba(${pr},${pg},${pb},${b.life*.15})`;ctx.lineWidth=1;ctx.stroke();\n            }catch(e){}\n            return true;\n          });\n        }\n      }catch(e){console.warn('animNature err',e);}\n      natureRAF=requestAnimationFrame(animNature);\n    }\n\n    function upsellNature(){\n      openSheet(`<h3>Nature Mode ✦ Premium<\u002Fh3>\n      <p style=\"font-size:14px;color:var(--b2);line-height:1.7;margin-bottom:18px\">Each screen transforms into a living, breathing nature environment — forest, ocean, cosmos and more — designed to bring calm to your day.<\u002Fp>\n      <div class=\"card pad\" style=\"margin-bottom:14px\">\n        <div style=\"font-size:13px;color:var(--b2);line-height:2\">\n          🌿 &nbsp;12 unique per-screen scenes<br>\n          🌊 &nbsp;Real-time animated canvas<br>\n          ✦ &nbsp;Light + dark variants<br>\n          🌙 &nbsp;Calming micro-interactions\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"actions\">\n        <button class=\"btn btn-ink\" onclick=\"closeSheet();go('settings')\">Upgrade to Premium<\u002Fbutton>\n        <button class=\"btn btn-ghost\" onclick=\"closeSheet()\">Maybe later<\u002Fbutton>\n      <\u002Fdiv>`);\n    }\n    function startNature(){\n      if(!isPremium()){upsellNature();return;}\n      natureOn=true;\n      document.documentElement.setAttribute('data-nature','on');\n      const layer=document.getElementById('nature-layer');\n      if(layer) layer.style.opacity='1';\n      try{localStorage.setItem('keptly-nature','1');}catch(e){}\n      initScene(); animNature();\n      // Click burst — tap anywhere to release particles\n      const _nc=document.getElementById('nature-canvas');\n      if(_nc&&!_nc.__burstBound){\n        _nc.__burstBound=true;\n        _nc.addEventListener('click',e=>{\n          const rect=_nc.getBoundingClientRect();\n          const nx=(e.clientX-rect.left)/_nc.width;\n          const ny=(e.clientY-rect.top)/_nc.height;\n          if(!_ns.bursts)_ns.bursts=[];\n          for(let i=0;i<32;i++){\n            const ang=Math.random()*Math.PI*2,spd=.25+Math.random()*.95;\n            _ns.bursts.push({x:nx,y:ny,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:.9+Math.random()*.5});\n          }\n        });\n      }\n      updateNature(route().split('/')[0]);\n      const nb=document.getElementById('nature-btn');if(nb){nb.classList.add('on');nb.title='Nature mode on';}\n      render(); toast('Nature Mode ✦ on — tap to bloom ✦');\n    }\n\n    function stopNature(){\n      natureOn=false;\n      document.documentElement.removeAttribute('data-nature');\n      cancelAnimationFrame(natureRAF); natureRAF=null;\n      const nb=document.getElementById('nature-btn');if(nb){nb.classList.remove('on');nb.title='Nature mode off';}\n      const layer=document.getElementById('nature-layer');\n      if(layer){layer.style.opacity='0';layer.style.background='';}\n      const c=document.getElementById('nature-canvas');\n      if(c){const ctx=c.getContext('2d');ctx.clearRect(0,0,c.width,c.height);}\n      try{localStorage.setItem('keptly-nature','0');}catch(e){}\n      render(); toast('Nature Mode off');\n    }\n\n    function toggleNature(){natureOn?stopNature():startNature();}\n\n    document.addEventListener('mousemove',e=>{\n      natureMouse.x=e.clientX/window.innerWidth;\n      natureMouse.y=e.clientY/window.innerHeight;\n      if(natureOn) updateNature(route().split('/')[0]);\n    });\n    if(window.DeviceOrientationEvent){\n      window.addEventListener('deviceorientation',e=>{\n        if(!natureOn) return;\n        natureMouse.x=.5+(e.gamma||0)/60;\n        natureMouse.y=.5+(e.beta||0)/90;\n        updateNature(route().split('/')[0]);\n      });\n    }\n    window.addEventListener('resize',()=>{\n      if(natureOn) initScene();\n    });\n    // Watchdog: restart nature RAF if it silently dies\n    let _lastNatureFrame=0;\n    setInterval(()=>{\n      if(!natureOn) return;\n      const now=Date.now();\n      if(_lastNatureFrame&&now-_lastNatureFrame>2200){\n        console.warn('nature watchdog restart');\n        if(natureRAF){cancelAnimationFrame(natureRAF);natureRAF=null;}\n        initScene();animNature();\n      }\n    },2500);\n    \n    // Restore on load\n    try{if(localStorage.getItem('keptly-nature')==='1')setTimeout(()=>{if(isPremium())startNature();else localStorage.removeItem('keptly-nature');},400);}catch(e){}\n\n    // ---- THEME ----\n    function applyTheme(t) {\n      document.documentElement.setAttribute('data-theme', t);\n      const ico = document.getElementById('theme-ico');\n      if (ico) {\n        ico.innerHTML = t === 'light'\n          ? '<circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"5\"/><path class=\"ico\" d=\"M12 2v2M12 20v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M2 12h2M20 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42\"/>'\n          : '<path class=\"ico\" d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z\"/>';\n      }\n      try { localStorage.setItem('keptly-theme', t); } catch(e) {}\n    }\n    function toggleTheme() {\n      const cur = document.documentElement.getAttribute('data-theme') || 'dark';\n      applyTheme(cur === 'dark' ? 'light' : 'dark');\n      toast(cur === 'dark' ? 'Warm light mode' : 'Dark mode');\n    }\n    (function initTheme() {\n      let saved = 'dark';\n      try { saved = localStorage.getItem('keptly-theme') || 'dark'; } catch(e) {}\n      applyTheme(saved);\n    })();\n    window.toggleTheme = toggleTheme;\n    window.applyTheme = applyTheme;\n    window.startNature = startNature;\n    window.obNext = obNext;\n    window.obSample = obSample;\n    window.obFinish = obFinish;\n    window.obSelect = obSelect;\n    window.stopNature = stopNature;\n    window.toggleNature = toggleNature;\n\n    // Ensure topbar buttons fire even if DC editor intercepts onclick\n    setTimeout(() => {\n      // onClick handled by React template\n      const nb = document.getElementById('nature-btn');\n      if (nb) {\n        nb.addEventListener('click', toggleNature);\n        if (natureOn) nb.classList.add('on');\n      }\n    }, 300);\n\n    // Also: keyboard shortcut — press T to toggle theme\n    document.addEventListener('keydown', e => {\n      if (e.key === 't' && !e.metaKey && !e.ctrlKey && !['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName)) {\n        toggleTheme();\n      }\n    });\n\n    // ---- BOOT ----\n    try{init();}catch(err){console.error('init failed',err);document.getElementById('view').innerHTML='<div class=\"empty\" style=\"padding:60px 20px\"><p>Something went wrong.<\u002Fp><button class=\"btn btn-ink\" onclick=\"location.reload()\">Reload<\u002Fbutton><\u002Fdiv>';}\n    try{cloudInit();}catch(err){console.warn('cloud unavailable',err);}\n\n    const hideSplash=()=>document.getElementById('splash')?.classList.add('gone');\n    setTimeout(hideSplash,900);\n    window.addEventListener('load',()=>{setTimeout(hideSplash,700);if(new URLSearchParams(location.search).has('emergency'))openEmergency();});\n    if('serviceWorker' in navigator) window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').then(r=>r.update()).catch(()=>{}));\n  }\n\n  renderVals(){\n    return {\n      obNext:          () => window.obNext?.(),\n      obSample:        () => window.obSample?.(),\n      obFinish:        () => window.obFinish?.(),\n      obSelGoals:      (e) => window.obSelect?.(e.currentTarget,'goals'),\n      obSelProjects:   (e) => window.obSelect?.(e.currentTarget,'projects'),\n      obSelVault:      (e) => window.obSelect?.(e.currentTarget,'vault'),\n      openEmergency:   () => window.openEmergency?.(),\n      toggleTheme:     () => window.toggleTheme?.(),\n      openSearch:      () => window.openSearch?.(),\n      goSettings:      () => window.go?.('settings'),\n      fabAction:       () => window.fabAction?.(),\n      closeSheet:      () => window.closeSheet?.(),\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"},"entry":"Keptly App v2.dc"}
