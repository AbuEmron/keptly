document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    const templateData = JSON.parse(templateEl.textContent);
    const pages = templateData.pages;
    const entryId = templateData.entry;
    const pageIds = Object.keys(pages);

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : {};

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    // Per-page prep: substitute UUIDs, strip SRI/crossorigin (blob URLs from a
    // file:// document inherit a null origin, so crossorigin forces a CORS
    // fetch that SRI then rejects — the manifest bytes are ours; SRI protects
    // against CDN compromise, not this), and inject the page's own
    // window.__resources + the click interceptor into <head>. slice() rather
    // than replace() keeps us clear of $-pattern substitution.
    function resourcesFor(id) {
      var map = {};
      var list = extResources[id] || [];
      for (var k = 0; k < list.length; k++) {
        if (blobUrls[list[k].uuid]) map[list[k].id] = blobUrls[list[k].uuid];
      }
      return map;
    }
    for (const id of pageIds) {
      let t = pages[id];
      for (const uuid of uuids) t = t.split(uuid).join(blobUrls[uuid]);
      t = t.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');
      // The click interceptor owns every anchor click (not a <base target>):
      // a blanket <base target="_parent"> would also redirect form submissions
      // and tear down the wrapper. Non-# links navigate the parent to the
      // anchor's resolved href; #/… routes forward to the parent's hash only
      // when the id is one of this bundle's own pages (author #/… links from
      // an in-page hash router are left to the scroll path so they don't yank
      // the user to the entry page); plain #frag scrolls in place.
      // composedPath + getAttribute('target') handle SVG <a> and shadow-DOM
      // anchors, which closest()/IDL .target get wrong.
      var headContent = 'window.__resources = ' + JSON.stringify(resourcesFor(id)) + ';' +
        (pageIds.length > 1 ?
          'window.__bundler_pages = ' + JSON.stringify(pageIds) + ';' +
          'document.addEventListener("click", function(e){' +
            'if (e.button !== 0 || e.metaKey || e.ctrlKey || e.shiftKey || e.altKey || e.defaultPrevented) return;' +
            'var a = null, p = e.composedPath ? e.composedPath() : [e.target];' +
            'for (var j = 0; j < p.length && !a; j++) {' +

              'if (tn === "A" || tn === "a" || tn === "AREA") a = n;' +
            '}' +
            'if (!a && e.target.closest) a = e.target.closest("a, area");' +
            'if (!a || a.hasAttribute("download")) return;' +
            'var tg = a.getAttribute("target");' +
            'if (tg && tg !== "_self") return;' +
            'var h = a.getAttribute("href") || a.getAttribute("xlink:href");' +
            'if (!h || /^javascript:/i.test(h)) return;' +
            'if (h.charAt(0) !== "#") {' +
              'if (!tg) { var b = document.querySelector("base[target]"); if (b && b.getAttribute("target") !== "_self") return; }' +
              'e.preventDefault();' +
              'if (/^(?:[a-z][a-z0-9+.-]*:|\\/\\/)/i.test(h)) parent.location.assign(h);' +
              'return;' +
            '}' +
            'e.preventDefault();' +
            'if (h.slice(0, 2) === "#/") {' +
              'var c = h.indexOf(":", 2);' +
              'var pid = c < 0 ? h.slice(2) : h.slice(2, c);' +
              'try { pid = decodeURIComponent(pid); } catch(err) {}' +
              'if (window.__bundler_pages.indexOf(pid) >= 0) { parent.location.hash = h; return; }' +
            '}' +
            'var t = h.length > 1 ? document.getElementById(h.slice(1)) : null;' +
            'if (t) t.scrollIntoView({behavior:"smooth"});' +
            'else scrollTo({top:0, behavior:"smooth"});' +
          '});' : '');
      // Defuse any script end-tag sequence in the content (resource ids, page
      // ids) before wrapping — same escape level as every sibling JSON island.
      var headScript = '<script>' +
        headContent.split('</' + 'script').join('<\\/' + 'script') +
        '</' + 'script>';
      // Inject after <head> so the DOCTYPE stays first; prepending the script
      // would push the parser into quirks mode. DOMParser always emits a <head>
      // (synthesizing one if the source HTML omitted it) but may carry
      // attributes through, so match the full opening tag.
      var headOpen = t.match(/<head[^>]*>/i);
      if (headOpen) {
        var hi = headOpen.index + headOpen[0].length;
        t = t.slice(0, hi) + headScript + t.slice(hi);
      }
      pages[id] = t;
    }

    setStatus('Rendering...');

    if (pageIds.length === 1) {
      // Single page: the pre-crawl render path. Parse the template and swap the
      // root element. Scripts inserted via DOMParser/replaceWith are inert per
      // spec — re-create each with createElement so they execute, awaiting
      // onload for src scripts to preserve ordering (React before ReactDOM
      // before Babel before text/babel).
      var template = pages[entryId];
      const doc = new DOMParser().parseFromString(template, 'text/html');
      document.documentElement.replaceWith(doc.documentElement);
      const dead = Array.from(document.scripts);
      for (const old of dead) {
        const s = document.createElement('script');
        for (const a of old.attributes) s.setAttribute(a.name, a.value);
        s.textContent = old.textContent;
        // text/babel scripts with a src: fetch and inline. transformScriptTags
        // does XHR against the src, but blob:null/ from a file:// origin is
        // silently dropped. Inlining makes it a plain inline babel script,
        // which transformScriptTags handles unconditionally.
        if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
          try {
            const r = await fetch(s.src);
            s.textContent = await r.text();
            s.removeAttribute('src');
          } catch (e) {}
        }
        // Non-executable script types (text/babel, application/json, …) are
        // data blocks per spec: the browser never fetches src and never fires
        // load/error, so awaiting would hang forever.
        const exec = !s.type || s.type === 'module' || /(java|ecma)script/i.test(s.type);
        const p = (s.src && exec) ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
        old.replaceWith(s);
        if (p) await p;
      }
      // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
      // which fired before we swapped the document. Trigger manually if present.
      if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
        window.Babel.transformScriptTags();
      }
      return;
    }

    // Multi-page: render into a full-viewport srcdoc iframe so each page runs
    // in its own realm while staying same-origin with the parent (so asset
    // blob URLs load and parent.location is writable).
    var frame = document.createElement('iframe');
    frame.id = '__bundler_frame';
    frame.setAttribute('style', 'position:fixed;inset:0;width:100%;height:100%;border:0;background:#fff');
    document.body.appendChild(frame);

    function decode(s) {
      try { return decodeURIComponent(s); } catch (e) { return s; }
    }
    function route() {
      var h = (location.hash || '');
      if (h.slice(0, 2) !== '#/') return { id: entryId, anchor: '' };
      h = h.slice(2);
      var i = h.indexOf(':');
      return i < 0 ? { id: decode(h), anchor: '' }
                   : { id: decode(h.slice(0, i)), anchor: decode(h.slice(i + 1)) };
    }

    var current = null;
    var navGen = 0;
    function navigate() {
      var r = route();
      var id = Object.prototype.hasOwnProperty.call(pages, r.id) ? r.id : entryId;
      if (current === id) {
        // Same-page anchor change: the iframe's own hash handles this, so
        // normally we don't reach here. If we do (e.g. a programmatic
        // parent.location.hash change), nudge the iframe.
        var cw = frame.contentWindow;
        if (!cw) return;
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView({ behavior: 'smooth' });
        else cw.scrollTo({ top: 0, behavior: 'smooth' });
        return;
      }
      current = id;
      var gen = ++navGen;
      frame.onload = function() {
        // One-shot: an iframe-internal navigation (form submit, page JS
        // location.href=) re-fires onload with the same gen; after that the
        // iframe may be cross-origin, and cw.* access would throw.
        frame.onload = null;
        if (gen !== navGen) return;
        var cw = frame.contentWindow;
        try { cw.document.title && (document.title = cw.document.title); } catch (e) {}
        var splash = document.getElementById('__bundler_thumbnail') ||
                     document.getElementById('__bundler_placeholder');
        if (splash) splash.remove();
        if (loading) loading.remove();
        var el = r.anchor && cw.document.getElementById(r.anchor);
        if (el) el.scrollIntoView();
        else cw.scrollTo(0, 0);
      };
      frame.srcdoc = pages[id];
    }

    window.addEventListener('hashchange', navigate);
    navigate();
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

u002Fbutton>\n\n<!-- SHEET -->\n<div class=\"scrim\" id=\"scrim\" onclick=\"{{ closeSheet }}\"><\u002Fdiv>\n<div class=\"sheet\" id=\"sheet\" role=\"dialog\" aria-modal=\"true\"><\u002Fdiv>\n\n<!-- EMERGENCY -->\n<div class=\"emg\" id=\"emg\" role=\"dialog\" aria-modal=\"true\"><\u002Fdiv>\n\n<!-- TOAST -->\n<div class=\"toast\" id=\"toast\" role=\"status\"><\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\n\nclass Component extends DCLogic {\n  componentDidMount() {\n    window.KEPTLY_CONFIG = window.KEPTLY_CONFIG || { SUPABASE_URL:'', SUPABASE_ANON_KEY:'' };\n\n    // ---- STORE ----\n    const store = (() => {\n      let mem={}, ok=false;\n      try { localStorage.setItem('__t','1'); localStorage.removeItem('__t'); ok=true; } catch(e) {}\n      return {\n        available:ok, lastError:null,\n        get(k){try{return ok?JSON.parse(localStorage.getItem(k)):(mem[k]??null);}catch(e){return null;}},\n        set(k,v){this.lastError=null;try{if(ok)localStorage.setItem(k,JSON.stringify(v));else mem[k]=v;return true;}catch(e){mem[k]=v;this.lastError=(e&&e.name==='QuotaExceededError')?'quota':'error';return false;}}\n      };\n    })();\n\n    const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);\n    const todayISO=()=>new Date().toISOString().slice(0,10);\n    const fmtMoney=n=>'$'+Number(n||0).toLocaleString(undefined,{maximumFractionDigits:0});\n    const fmtDate=d=>d?new Date(d+'T00:00:00').toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'—';\n    const daysUntil=d=>d?Math.ceil((new Date(d+'T00:00:00')-new Date(todayISO()+'T00:00:00'))/86400000):null;\n    const esc=s=>String(s??'').replace(/[&<>\"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','\"':'&quot;',\"'\":'&#39;'}[c]));\n\n    const blank=()=>({profile:{name:''},goals:[],projects:[],home:[],vehicles:[],vault:[],family:[],finance:{bills:[],subs:[],debts:[],assets:[]},medical:[],insurance:[],legacy:{contacts:[],wishes:'',documents:'',assets:''},emergency:{medical:'',insurance:'',plan:''},activity:[]});\n\n    let S=Object.assign(blank(),store.get('keptly')||store.get('avenor')||{});\n    if(!store.get('keptly')&&store.get('avenor')) store.set('keptly',S);\n    S.finance=Object.assign({bills:[],subs:[],debts:[],assets:[]},S.finance||{});\n    S.legacy=Object.assign({contacts:[],wishes:'',documents:'',assets:''},S.legacy||{});\n    if(!S.medical) S.medical=[];\n    if(!S.insurance) S.insurance=[];\n\n    function save(){const ok=store.set('keptly',S);if(!ok){if(store.lastError==='quota')toast('Storage full — download a backup');else toast('Could not save');}if(typeof schedulePush==='function')schedulePush();}\n    function log(t){S.activity.unshift({t,at:Date.now()});S.activity=S.activity.slice(0,20);}\n    function toast(m){const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(t._h);t._h=setTimeout(()=>t.classList.remove('show'),2600);}\n\n    // ---- PARTICLES ----\n    function burst(el) {\n      if(!el) return;\n      const rect=el.getBoundingClientRect(), cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;\n      const colors=['#6EC6E0','#8DD8EE','#B2EAFF','#42D4B2','#D8E8FF'];\n      for(let i=0;i<10;i++){\n        const p=document.createElement('div'); p.className='particle';\n        p.style.cssText=`left:${cx}px;top:${cy}px;background:${colors[i%colors.length]};width:${5+Math.random()*5}px;height:${5+Math.random()*5}px`;\n        document.body.appendChild(p);\n        const a=(i/10)*Math.PI*2+Math.random()*.5, d=35+Math.random()*35;\n        p.animate([{transform:`translate(-50%,-50%) scale(1)`,opacity:1},{transform:`translate(calc(-50% + ${Math.cos(a)*d}px),calc(-50% + ${Math.sin(a)*d}px)) scale(0)`,opacity:0}],{duration:500+Math.random()*200,easing:'cubic-bezier(.22,1,.36,1)',fill:'forwards'}).onfinish=()=>p.remove();\n      }\n      if(navigator.vibrate) navigator.vibrate([8]);\n    }\n\n    // ---- ICONS ----\n    const I={\n      today:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M3 11.5 12 4l9 7.5M5.5 10v9.5h13V10\"/><\u002Fsvg>',\n      goals:'<svg viewBox=\"0 0 24 24\"><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"8.5\"/><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"3.5\"/><\u002Fsvg>',\n      projects:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 7h16v12H4zM9 7V5h6v2\"/><\u002Fsvg>',\n      vault:'<svg viewBox=\"0 0 24 24\"><rect class=\"ico\" x=\"4\" y=\"5\" width=\"16\" height=\"14\" rx=\"2\"/><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"3\"/><path class=\"ico\" d=\"M12 12h2.2\"/><\u002Fsvg>',\n      home:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 21V8l8-5 8 5v13M9 21v-6h6v6\"/><\u002Fsvg>',\n      car:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M5 16l1.2-5.2A2 2 0 0 1 8.1 9.2h7.8a2 2 0 0 1 1.9 1.6L19 16M4 16h16v3\"/><circle class=\"ico\" cx=\"8\" cy=\"18\" r=\"1.4\"/><circle class=\"ico\" cx=\"16\" cy=\"18\" r=\"1.4\"/><\u002Fsvg>',\n      family:'<svg viewBox=\"0 0 24 24\"><circle class=\"ico\" cx=\"9\" cy=\"8\" r=\"3\"/><circle class=\"ico\" cx=\"16.5\" cy=\"10\" r=\"2.2\"/><path class=\"ico\" d=\"M4 19c0-2.8 2.2-5 5-5s5 2.2 5 5M14.5 15.4c2 .3 3.5 1.8 3.5 3.6\"/><\u002Fsvg>',\n      med:'<svg viewBox=\"0 0 24 24\"><rect class=\"ico\" x=\"4\" y=\"6\" width=\"16\" height=\"14\" rx=\"2\"/><path class=\"ico\" d=\"M9 6V4h6v2M12 10v6M9 13h6\"/><\u002Fsvg>',\n      ins:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M12 3C7 3 3 6 3 11a9 9 0 0 0 9 9 9 9 0 0 0 9-9c0-5-4-8-9-8z\"/><\u002Fsvg>',\n      legacy:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 5a2 2 0 0 1 2-2h9l5 5v11a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2z\"/><path class=\"ico\" d=\"M12 8.5c-1-1.6-3.6-1-3.6 1 0 1.4 2.2 2.8 3.6 3.8 1.4-1 3.6-2.4 3.6-3.8 0-2-2.6-2.6-3.6-1z\"/><\u002Fsvg>',\n      watch:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M12 3l7 3v5c0 4.5-3 7.5-7 9-4-1.5-7-4.5-7-9V6z\"/><path class=\"ico\" d=\"M9 12l2 2 4-4\"/><\u002Fsvg>',\n      gear:'<svg viewBox=\"0 0 24 24\"><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"3\"/><path class=\"ico\" d=\"M12 3.5v2.2M12 18.3v2.2M3.5 12h2.2M18.3 12h2.2M5.9 5.9l1.6 1.6M16.5 16.5l1.6 1.6M18.1 5.9l-1.6 1.6M7.5 16.5l-1.6 1.6\"/><\u002Fsvg>',\n      finance:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 18V6m0 12h16M7.5 14v-3m4.5 3V8m4.5 6v-5\"/><\u002Fsvg>',\n      edit:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 20l4-.8L19.5 7.7a2 2 0 0 0-2.8-2.8L5.2 16.4 4 20z\"/><\u002Fsvg>',\n      plus:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M12 5v14M5 12h14\"/><\u002Fsvg>',\n      trash:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M6 7h12M9 7V5h6v2M8 7l1 12h6l1-12\"/><\u002Fsvg>',\n      chevr:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M9 6l6 6-6 6\"/><\u002Fsvg>',\n      lock:'<svg viewBox=\"0 0 24 24\"><rect class=\"ico\" x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2\"/><path class=\"ico\" d=\"M8 11V8a4 4 0 0 1 8 0v3\"/><\u002Fsvg>',\n      eye:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7z\"/><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"2.5\"/><\u002Fsvg>',\n      scan:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M4 8V6a2 2 0 0 1 2-2h2M16 4h2a2 2 0 0 1 2 2v2M20 16v2a2 2 0 0 1-2 2h-2M8 20H6a2 2 0 0 1-2-2v-2M4 12h16\"/><\u002Fsvg>',\n      upload:'<svg viewBox=\"0 0 24 24\"><path class=\"ico\" d=\"M12 16V4m0 0l-4 4m4-4l4 4M4 16v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2\"/><\u002Fsvg>',\n    };\n\n    const MORE_ICON='<svg viewBox=\"0 0 24 24\"><circle class=\"ico\" cx=\"5\" cy=\"12\" r=\"1.5\"/><circle class=\"ico\" cx=\"12\" cy=\"12\" r=\"1.5\"/><circle class=\"ico\" cx=\"19\" cy=\"12\" r=\"1.5\"/><\u002Fsvg>';\n    const ALL_SECTIONS=[\n      {id:'today',label:'Today',icon:I.today},{id:'watch',label:'Watch',icon:I.watch},\n      {id:'goals',label:'Goals',icon:I.goals},{id:'projects',label:'Projects',icon:I.projects},\n      {id:'vault',label:'Vault',icon:I.vault},{id:'finance',label:'Finance',icon:I.finance},\n      {id:'home',label:'Home',icon:I.home},{id:'vehicles',label:'Vehicles',icon:I.car},\n      {id:'insurance',label:'Insurance',icon:I.ins},{id:'medical',label:'Medical',icon:I.med},\n      {id:'family',label:'Family',icon:I.family},{id:'legacy',label:'Legacy',icon:I.legacy},\n    ];\n    const NAV=[{id:'today',label:'Today',icon:I.today},{id:'watch',label:'Watch',icon:I.watch},{id:'projects',label:'Projects',icon:I.projects},{id:'goals',label:'Goals',icon:I.goals},{id:'__more__',label:'More',icon:MORE_ICON}];\n    const RAIL=[...ALL_SECTIONS];\n    const SCREEN_ORDER=['today','watch','goals','projects','vault','finance','home','vehicles','insurance','medical','family','legacy','settings','trust'];\n\n    function route(){return location.hash.replace('#','')||'today';}\n    let prevRoute='today';\n    function go(r){\n      prevRoute=route().split('/')[0];\n      location.hash=r;\n      // Self-heal: restart nature RAF loop if it died\n      if(natureOn&&!natureRAF){setTimeout(()=>{if(natureOn&&!natureRAF){natureRAF=1;animNature();}},50);}\n    }\n    window.addEventListener('hashchange',render);\n\n    function showMore(){\n      const r=route().split('/')[0];\n      const grid=document.getElementById('more-grid');\n      if(!grid) return;\n      grid.innerHTML=ALL_SECTIONS.map(n=>`\n        <button class=\"more-tile ${r===n.id?'on':''}\" onclick=\"closeMore();go('${n.id}')\">\n          ${n.icon}<span>${n.label}<\u002Fspan>\n        <\u002Fbutton>`).join('');\n      const d=document.getElementById('more-drawer');\n      if(d) d.classList.add('open');\n    }\n    function closeMore(){\n      const d=document.getElementById('more-drawer');\n      if(d) d.classList.remove('open');\n    }\n    window.showMore=showMore;\n    window.closeMore=closeMore;\n\n    function renderNav(){\n      const r=route().split('/')[0];\n      const moreActive=!NAV.slice(0,-1).some(n=>n.id===r);\n      document.getElementById('tabbar').innerHTML=NAV.map(n=>{\n        if(n.id==='__more__'){\n          return `<button class=\"tab ${moreActive?'on':''}\" onclick=\"showMore()\">${n.icon}${n.label}<\u002Fbutton>`;\n        }\n        return `<button class=\"tab ${r===n.id?'on':''}\" onclick=\"go('${n.id}')\">${n.icon}${n.label}<\u002Fbutton>`;\n      }).join('');\n      document.getElementById('rail').innerHTML=`<span class=\"wordmark\">Keptly<\u002Fspan>`+\n        RAIL.map(n=>`<button class=\"navbtn ${r===n.id?'on':''}\" onclick=\"go('${n.id}')\">${n.icon}${n.label}<\u002Fbutton>`).join('')+\n        `<div class=\"spacer\"><\u002Fdiv><button class=\"navbtn ${r==='settings'?'on':''}\" onclick=\"go('settings')\">${I.gear}Settings<\u002Fbutton><button class=\"navbtn\" onclick=\"openEmergency()\" style=\"color:var(--signal)\">${I.family}Emergency<\u002Fbutton>`;\n      // Close more drawer when navigating via tab\n      closeMore();\n    }\n\n    // ---- LIFE PULSE ----\n    function pulse(){\n      const BASE=72,factors=[];\n      const allTasks=S.projects.flatMap(p=>p.tasks||[]);\n      const overdue=allTasks.filter(t=>!t.done&&t.due&&daysUntil(t.due)<0).length;\n      if(overdue) factors.push({label:`${overdue} task${overdue>1?'s':''} ready for your attention`,delta:-Math.min(20,overdue*4),hint:'Take it at your own pace',goto:'projects'});\n      const renewals=renewalFeed().filter(r=>r.days!==null&&r.days<=14).length;\n      if(renewals) factors.push({label:`${renewals} renewal${renewals>1?'s':''} coming up`,delta:-Math.min(15,renewals*5),hint:'A moment in Watch handles it',goto:'watch'});\n      const expired=S.vault.filter(d=>d.expires&&daysUntil(d.expires)<0).length;\n      if(expired) factors.push({label:`${expired} document${expired>1?'s':''} worth a quick look`,delta:-Math.min(12,expired*4),hint:'A small update in Vault',goto:'vault'});\n      const activeGoals=S.goals.length;\n      if(activeGoals) factors.push({label:`${activeGoals} active goal${activeGoals>1?'s':''}`,delta:Math.min(15,activeGoals*3),hint:'Direction set',goto:'goals'});\n      const doneToday=allTasks.filter(t=>t.done&&t.doneAt&&(Date.now()-t.doneAt)<86400000).length;\n      if(doneToday) factors.push({label:`${doneToday} completed today`,delta:Math.min(10,doneToday*2),hint:'Momentum',goto:'projects'});\n      const scans=S.vault.filter(d=>d.scan).length;\n      if(scans) factors.push({label:`${scans} document${scans>1?'s':''} secured`,delta:Math.min(8,scans*2),hint:'Encrypted in vault',goto:'vault'});\n      if(S.lastBackup&&(Date.now()-S.lastBackup)<30*86400000) factors.push({label:'Recent backup on file',delta:5,hint:'Data protected',goto:'settings'});\n      const score=Math.max(8,Math.min(99,BASE+factors.reduce((a,f)=>a+f.delta,0)));\n      const notes=factors.length?factors.slice(0,3).map(f=>`<b>${f.label}<\u002Fb> — ${f.hint}`):['Add goals, scan a document, or set a renewal to bring your pulse to life.'];\n      return{score,base:BASE,factors,notes};\n    }\n\n    function animateGauge(score){\n      const arc=document.querySelector('.gauge-arc'), numEl=document.querySelector('.gauge-num');\n      if(!arc||!numEl) return;\n      const R=68, C=2*Math.PI*R, dur=1600;\n      let start=null;\n      function step(ts){\n        if(!start) start=ts;\n        const p=Math.min((ts-start)/dur,1);\n        const e=1-Math.pow(1-p,3.5);\n        arc.style.strokeDashoffset=C*(1-e*score/100);\n        numEl.textContent=Math.round(e*score);\n        if(p<1) requestAnimationFrame(step);\n      }\n      requestAnimationFrame(step);\n    }\n\n    function sheetPulse(){\n      const p=pulse();\n      const band=p.score>=80?'Strong':p.score>=60?'Steady':p.score>=40?'Needs attention':'At risk';\n      const row=f=>`<button class=\"divrow\" style=\"width:100%;text-align:left\" onclick=\"closeSheet();go('${f.goto}')\"><div class=\"grow\"><div class=\"title\">${esc(f.label)}<\u002Fdiv><div class=\"meta\">${esc(f.hint)}<\u002Fdiv><\u002Fdiv><span class=\"chip ${f.delta<0?'red':'green'}\">${f.delta>0?'+':''}${f.delta}<\u002Fspan><\u002Fbutton>`;\n      openSheet(`<h3>Life Pulse: ${p.score}<\u002Fh3><p style=\"font-size:13.5px;color:var(--b3);margin:-4px 0 14px\">${band} — here's what shapes your score.<\u002Fp>\n      <div class=\"card rowlist\">\n        <div class=\"divrow\"><div class=\"grow\"><div class=\"title\">Starting balance<\u002Fdiv><div class=\"meta\">Everyone starts here<\u002Fdiv><\u002Fdiv><span class=\"chip\">${p.base}<\u002Fspan><\u002Fdiv>\n        ${p.factors.length?p.factors.map(row).join(''):'<div class=\"empty\" style=\"padding:18px\"><p>Add content to see your score respond.<\u002Fp><\u002Fdiv>'}\n        <div class=\"divrow\" style=\"background:var(--s2)\"><div class=\"grow\"><div class=\"title\">Your Life Pulse<\u002Fdiv><div class=\"meta\">Capped 8–99<\u002Fdiv><\u002Fdiv><span class=\"chip brass\">${p.score}<\u002Fspan><\u002Fdiv>\n      <\u002Fdiv><div class=\"actions\"><button class=\"btn btn-ink\" onclick=\"closeSheet()\">Got it<\u002Fbutton><\u002Fdiv>`);\n    }\n\n    function renewalFeed(){\n      const out=[];\n      S.home.forEach(h=>{if(h.nextDue) out.push({label:h.item+' — service',date:h.nextDue,days:daysUntil(h.nextDue),goto:'home'});if(h.warrantyUntil) out.push({label:h.item+' — warranty',date:h.warrantyUntil,days:daysUntil(h.warrantyUntil),goto:'home'});});\n      S.vehicles.forEach(v=>{if(v.insurance) out.push({label:v.name+' — insurance',date:v.insurance,days:daysUntil(v.insurance),goto:'vehicles'});if(v.registration) out.push({label:v.name+' — registration',date:v.registration,days:daysUntil(v.registration),goto:'vehicles'});});\n      S.vault.forEach(d=>{if(d.expires) out.push({label:d.title+' — expires',date:d.expires,days:daysUntil(d.expires),goto:'vault'});});\n      (S.insurance||[]).forEach(p=>{if(p.renews) out.push({label:p.name+' — insurance',date:p.renews,days:daysUntil(p.renews),goto:'insurance'});});\n      return out.filter(r=>r.days!==null).sort((a,b)=>a.days-b.days);\n    }\n\n    // ---- VAULT ----\n    let _vaultKey=null;\n    const vaultUnlocked=()=>!!_vaultKey;\n    async function deriveKey(pass){const enc=new TextEncoder();const salt=S.vaultSalt||(S.vaultSalt=Array.from(crypto.getRandomValues(new Uint8Array(16))));const base=await crypto.subtle.importKey('raw',enc.encode(pass),'PBKDF2',false,['deriveKey']);return crypto.subtle.deriveKey({name:'PBKDF2',salt:new Uint8Array(salt),iterations:150000,hash:'SHA-256'},base,{name:'AES-GCM',length:256},false,['encrypt','decrypt']);}\n    async function encryptBlob(dataURL){const iv=crypto.getRandomValues(new Uint8Array(12));const ct=await crypto.subtle.encrypt({name:'AES-GCM',iv},_vaultKey,new TextEncoder().encode(dataURL));return{iv:Array.from(iv),ct:btoa(String.fromCharCode(...new Uint8Array(ct)))};}\n    async function decryptBlob(rec){const ct=Uint8Array.from(atob(rec.ct),c=>c.charCodeAt(0));const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv:new Uint8Array(rec.iv)},_vaultKey,ct);return new TextDecoder().decode(pt);}\n    function sheetUnlock(then){\n      const first=!S.vaultSalt;\n      openSheet(`<h3>${first?'Create vault passphrase':'Unlock vault'}<\u002Fh3><p style=\"font-size:13.5px;color:var(--b3);margin:-4px 0 14px\">${first?'Documents are encrypted on this device — passphrase never leaves it.':'Enter your vault passphrase to view encrypted documents.'}<\u002Fp>${FLD('vk','Passphrase','password','','')}<div class=\"actions\"><button class=\"btn btn-brass\" onclick=\"doUnlock(${then?`'${then}'`:'null'})\">${first?'Create vault':'Unlock'}<\u002Fbutton><\u002Fdiv>`);\n      setTimeout(()=>document.getElementById('vk')?.focus(),120);\n    }\n    async function doUnlock(then){\n      const p=fval('vk');if(p.length<4) return toast('Use at least 4 characters');\n      try{_vaultKey=await deriveKey(p);if(S.vaultCheck){try{await decryptBlob(S.vaultCheck);}catch(e){_vaultKey=null;return toast('Wrong passphrase');}}else{S.vaultCheck=await encryptBlob('keptly-ok');save();}\n      closeSheet();toast('Vault unlocked');if(then==='scan') startScan();else if(then==='drop') dropAnything();else render();}catch(e){toast('Could not unlock');}\n    }\n    function lockVault(){_vaultKey=null;toast('Vault locked');render();}\n    function startScan(){pickDoc(true);}\n    function dropAnything(){pickDoc(false);}\n    function pickDoc(camera){\n      if(!vaultUnlocked()) return sheetUnlock(camera?'scan':'drop');\n      const inp=document.createElement('input');inp.type='file';inp.accept=camera?'image/*':'image/*,application/pdf';if(camera) inp.capture='environment';\n      inp.onchange=()=>{const f=inp.files&&inp.files[0];if(f)routeIntake(f);};inp.click();\n    }\n    async function routeIntake(file){if(file.type==='application/pdf'||/\\.pdf$/i.test(file.name)) return processPDF(file);return processScan(file);}\n    async function aiEnhance(text,parsed){if(!sbSession||!isPremium()||!text||text.trim().length<10) return parsed;try{const r=await fetch('/api/extract-document',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sbSession.access_token},body:JSON.stringify({text:text.slice(0,6000)})});if(!r.ok) return parsed;const j=await r.json();if(!j.ok) return parsed;return{title:j.title||parsed.title||'',category:j.category||parsed.category||'Other',ref:j.ref||parsed.ref||'',expires:j.expires||parsed.expires||'',provider:j.provider||'',confidence:j.confidence,ai:true};}catch(e){return parsed;}}\n    function compress(file,max=1400){return new Promise(res=>{const img=new Image(),rd=new FileReader();rd.onload=()=>{img.onload=()=>{let{width:w,height:h}=img;const s=Math.min(1,max/Math.max(w,h));w*=s;h*=s;const c=document.createElement('canvas');c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);res(c.toDataURL('image/jpeg',0.7));};img.src=rd.result;};rd.readAsDataURL(file);});}\n    function parseDoc(text){const out={ref:'',expires:''},found=[];(text.match(/\\b(\\d{1,2})[\\/\\-\\.](\\d{1,2})[\\/\\-\\.](\\d{2,4})\\b/g)||[]).forEach(m=>{const p=m.split(/[\\/\\-\\.]/).map(Number);let y=p[2];if(y<100)y+=2000;let mo=p[0]-1,da=p[1];if(mo>11){mo=p[1]-1;da=p[0];}const d=new Date(y,mo,da);if(!isNaN(d))found.push(d);});const today=new Date(),future=found.filter(d=>d>today).sort((a,b)=>a-b),pick=future[0]||found.sort((a,b)=>b-a)[0];if(pick)out.expires=pick.toISOString().slice(0,10);const ref=(text.match(/(?:policy|member|account)\\s*(?:no\\.?|number|#)?\\s*[:#]?\\s*([A-Z0-9]{2,}(?:-[A-Z0-9]+)*)/i)||text.match(/(?:passport|license|id)\\s*(?:no\\.?|#)?\\s*[:#]?\\s*([A-Z0-9]{5,})/i));if(ref) out.ref=ref[1].trim().replace(/\\s+/g,'');const t=text.toLowerCase();out.category=/passport|driver|licen[cs]e|identity|birth/.test(t)?'Identity':/insur|policy|coverage/.test(t)?'Insurance':/warrant/.test(t)?'Warranties':/lease|agreement|contract/.test(t)?'Contracts':/receipt|invoice/.test(t)?'Receipts':/patient|medical|prescription/.test(t)?'Medical':'Other';return out;}\n    async function processPDF(file){openSheet(`<h3>Reading PDF…<\u002Fh3><div class=\"card pad\" style=\"text-align:center;padding:28px\"><p style=\"color:var(--b3);font-size:13.5px\" id=\"ocrstat\">Opening…<\u002Fp><div class=\"progress\" style=\"margin-top:12px\"><i id=\"ocrbar\" style=\"width:10%\"><\u002Fi><\u002Fdiv><\u002Fdiv>`);let text='',dataURL=null,parsed={ref:'',expires:'',category:'Other'};try{const lib=await(async()=>{if(window.__noPDF) return null;if(window.pdfjsLib) return window.pdfjsLib;try{const mod=await import('https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.min.mjs');mod.GlobalWorkerOptions.workerSrc='https://cdn.jsdelivr.net/npm/pdfjs-dist@4.0.379/build/pdf.worker.min.mjs';window.pdfjsLib=mod;return mod;}catch(e){window.__noPDF=1;return null;}})();const buf=await file.arrayBuffer();const stat=document.getElementById('ocrstat'),bar=document.getElementById('ocrbar');if(lib){const pdf=await lib.getDocument({data:buf}).promise;if(bar)bar.style.width='30%';for(let i=1;i<=Math.min(pdf.numPages,3);i++){const pg=await pdf.getPage(i);const tc=await pg.getTextContent();text+=' '+tc.items.map(it=>it.str).join(' ');}const pg=await pdf.getPage(1);const vp=pg.getViewport({scale:1.4});const c=document.createElement('canvas');c.width=vp.width;c.height=vp.height;await pg.render({canvasContext:c.getContext('2d'),viewport:vp}).promise;dataURL=c.toDataURL('image/jpeg',0.7);if(bar)bar.style.width='65%';if(text.trim().length<20&&!window.__noOCR&&window.Tesseract){if(stat)stat.textContent='Reading text…';const r=await Tesseract.recognize(dataURL,'eng',{logger:m=>{if(m.status==='recognizing text'&&bar)bar.style.width=(65+m.progress*30)+'%';}});text=r.data.text||'';}}}catch(e){toast('Could not read that PDF');}\n    parsed=parseDoc(text||'');parsed=await aiEnhance(text||'',parsed);let enc=null;try{if(dataURL)enc=await encryptBlob(dataURL);}catch(e){}closeSheet();sheetDoc(null,{scan:enc,ocr:(text||'').slice(0,4000),pdf:true,...parsed});}\n    async function processScan(file){openSheet(`<h3>Reading document…<\u002Fh3><div class=\"card pad\" style=\"text-align:center;padding:28px\"><p style=\"color:var(--b3);font-size:13.5px\" id=\"ocrstat\">Compressing…<\u002Fp><div class=\"progress\" style=\"margin-top:12px\"><i id=\"ocrbar\" style=\"width:8%\"><\u002Fi><\u002Fdiv><\u002Fdiv>`);const dataURL=await compress(file);let parsed={ref:'',expires:'',category:'Other'},text='';const stat=document.getElementById('ocrstat'),bar=document.getElementById('ocrbar');if(!window.__noOCR&&window.Tesseract){try{if(stat)stat.textContent='Recognizing text…';const r=await Tesseract.recognize(dataURL,'eng',{logger:m=>{if(m.status==='recognizing text'&&bar)bar.style.width=(15+m.progress*80)+'%';}});text=r.data.text||'';parsed=parseDoc(text);}catch(e){}}\n    parsed=await aiEnhance(text,parsed);let enc=null;try{enc=await encryptBlob(dataURL);}catch(e){}closeSheet();sheetDoc(null,{scan:enc,ocr:text.slice(0,4000),...parsed});}\n\n    // ---- VALUE ----\n    function ensureValue(){if(!S.saves)S.saves=[];}\n    function totalSaved(){ensureValue();return S.saves.reduce((a,s)=>a+Number(s.amt||0),0);}\n    function recordSave(amt,why){ensureValue();if(!amt)return;S.saves.unshift({amt:Number(amt),why,at:Date.now()});S.saves=S.saves.slice(0,100);log('Saved '+fmtMoney(amt)+' — '+why);}\n    function subAnnual(s){return s.cycle==='Yearly'?Number(s.amount||0):Number(s.amount||0)*12;}\n    function radar(){const out=[],add=(label,date,goto,stake,kind)=>{const d=daysUntil(date);if(d===null)return;out.push({label,date,days:d,goto,stake:stake||0,kind});};S.home.forEach(x=>{if(x.nextDue)add(x.item+' — service',x.nextDue,'home',0,'maintenance');if(x.warrantyUntil)add(x.item+' — warranty',x.warrantyUntil,'home',0,'warranty');});S.vehicles.forEach(v=>{if(v.insurance)add(v.name+' — insurance',v.insurance,'vehicles',0,'insurance');if(v.registration)add(v.name+' — registration',v.registration,'vehicles',0,'registration');});(S.insurance||[]).forEach(p=>{if(p.renews)add(p.name+' — insurance renews',p.renews,'insurance',0,'insurance');});S.vault.forEach(d=>{if(d.expires)add(d.title+' — expires',d.expires,'vault',0,'document');});S.finance.bills.forEach(b=>{if(b.dueDay){const d=new Date();let due=new Date(d.getFullYear(),d.getMonth(),Math.min(28,+b.dueDay||1));if(due<d)due=new Date(d.getFullYear(),d.getMonth()+1,Math.min(28,+b.dueDay||1));add(b.name+' — bill due',due.toISOString().slice(0,10),'finance',Number(b.amount||0),'bill');}});S.finance.subs.forEach(s=>{out.push({label:s.name+' — still using it?',date:null,days:9999,goto:'finance',stake:subAnnual(s),kind:'sub',sub:s});});return out.sort((a,b)=>a.days-b.days);}\n    function moneyAtRisk(){return radar().filter(r=>r.days<=30&&r.kind==='bill').reduce((a,r)=>a+r.stake,0);}\n\n    // ---- VIEWS ----\n    const V={};\n    const HORIZONS=['5 years','3 years','1 year','90 days','30 days'];\n    const VAULT_CATS=['Identity','Insurance','Contracts','Receipts','Warranties','Medical','Property','Other'];\n\n    V.today=()=>{\n      const p=pulse(), C=2*Math.PI*68;\n      const tasks=S.projects.flatMap(pr=>(pr.tasks||[]).map(t=>({...t,project:pr.title, 110,198,224,.7))\"/>\n            <text class=\"gauge-num\" x=\"80\" y=\"88\" text-anchor=\"middle\" font-size=\"36\">0<\u002Ftext>\n            <text class=\"gauge-label\" x=\"80\" y=\"105\" text-anchor=\"middle\" font-size=\"9\">PULSE<\u002Ftext>\n          <\u002Fsvg>\n          <div class=\"pulse-facts\">${p.notes.map(n=>`<div class=\"pulse-fact\">${n}<\u002Fdiv>`).join('')}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fbutton>\n      ${(totalSaved()||moneyAtRisk())?`<div class=\"section grid2 stagger\">\n        ${totalSaved()?`<button class=\"stat\" style=\"cursor:pointer;text-align:left\" onclick=\"go('watch')\"><div class=\"k\">Saved with Keptly<\u002Fdiv><div class=\"v\" style=\"color:var(--verdant)\">${fmtMoney(totalSaved())}<\u002Fdiv><\u002Fbutton>`:''}\n        ${moneyAtRisk()?`<button class=\"stat\" style=\"cursor:pointer;text-align:left\" onclick=\"go('watch')\"><div class=\"k\">Upcoming bills<\u002Fdiv><div class=\"v\">${fmtMoney(moneyAtRisk())}<\u002Fdiv><\u002Fbutton>`:''}\n      <\u002Fdiv>`:''}\n      <div class=\"section\"><span class=\"eyebrow\">Up Next<\u002Fspan>\n        <div class=\"card rowlist stagger\" style=\"margin-top:12px\">${tasks.length?tasks.map(t=>taskRow(t,t.pid)).join(''):`<div class=\"empty\"><div class=\"glyph\">→<\u002Fdiv><p>Set tasks inside a project and they surface here automatically.<\u002Fp><button class=\"btn btn-ink\" onclick=\"go('projects')\">Go to projects<\u002Fbutton><\u002Fdiv>`}<\u002Fdiv>\n      <\u002Fdiv>\n      ${ren.length?`<div class=\"section\"><span class=\"eyebrow\">Renewals & Deadlines<\u002Fspan>\n        <div class=\"ren-card stagger\" style=\"margin-top:12px\">${ren.map(r=>`<div class=\"ren-row\" onclick=\"go('${r.goto}')\"><div class=\"label\">${esc(r.label)}<\u002Fdiv><span class=\"date\">${fmtDate(r.date)}<\u002Fspan><span class=\"chip ${r.days<0?'red':r.days<=14?'brass':''}\">${r.days<0?Math.abs(r.days)+'d late':r.days===0?'today':'in '+r.days+'d'}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv>
