>`}<\u002Fbutton>`;\n      return `<span class=\"eyebrow\">Watch<\u002Fspan><h1 class=\"page\">Nothing slips by.<\u002Fh1><p class=\"sub\">Renewals, bills and warranties — watched so you never miss a date.<\u002Fp>\n      <div class=\"section watch-hero\"><span class=\"eyebrow\">Value delivered<\u002Fspan><div class=\"big\">${fmtMoney(saved)}<\u002Fdiv><div class=\"note\">saved or protected${atRisk?` · <b style=\"color:var(--b)\">${fmtMoney(atRisk)}<\u002Fb> in bills within 30 days`:''}<\u002Fdiv><\u002Fdiv>\n      ${urgent.length?`<div class=\"section\"><span class=\"eyebrow\">Next 30 days<\u002Fspan><div class=\"card rowlist stagger\" style=\"margin-top:12px\">${urgent.map(card).join('')}<\u002Fdiv><\u002Fdiv>`:`<div class=\"section card empty\"><div class=\"glyph\">✓<\u002Fdiv><p>Nothing due in the next 30 days.<\u002Fp><button class=\"btn btn-ink\" onclick=\"go('vault')\">Scan a document<\u002Fbutton><\u002Fdiv>`}\n      ${subs.length?`<div class=\"section\"><span class=\"eyebrow\">Subscription check · ${fmtMoney(subs.reduce((a,s)=>a+s.stake,0))}/yr<\u002Fspan><p class=\"sub\" style=\"margin:5px 0 0;font-size:12.5px\">Tap one you've cancelled to log the savings.<\u002Fp><div class=\"card rowlist stagger\" style=\"margin-top:12px\">${subs.map(card).join('')}<\u002Fdiv><\u002Fdiv>`:''}\n      ${soon.length?`<div class=\"section\"><span class=\"eyebrow\">On the horizon · 31–90 days<\u002Fspan><div class=\"card rowlist stagger\" style=\"margin-top:12px\">${soon.map(card).join('')}<\u002Fdiv><\u002Fdiv>`:''}\n      ${recent.length?`<div class=\"section\"><span class=\"eyebrow\">Recent wins<\u002Fspan><div class=\"card rowlist stagger\" style=\"margin-top:12px\">${recent.map(s=>`<div class=\"row\"><div class=\"grow\"><div class=\"title\">${esc(s.why)}<\u002Fdiv><div class=\"meta\">${new Date(s.at).toLocaleDateString(undefined,{month:'short',day:'numeric'})}<\u002Fdiv><\u002Fdiv><span class=\"chip green\">+${fmtMoney(s.amt)}<\u002Fspan><\u002Fdiv>`).join('')}<\u002Fdiv><\u002Fdiv>`:''}`;\n    };\n\n    function cancelSub(id){const s=S.finance.subs.find(x=>x.id===id);if(!s)return;if(!confirm('Mark \"'+s.name+'\" as cancelled and log '+fmtMoney(subAnnual(s))+'/yr saved?'))return;S.finance.subs=S.finance.subs.filter(x=>x.id!==id);recordSave(subAnnual(s),'Cancelled '+s.name);save();render();toast('Nice — '+fmtMoney(subAnnual(s))+'/yr back in your pocket');}\n\n    V.goals=()=>`<span class=\"eyebrow\">Goals<\u002Fspan><h1 class=\"page\">The long game.<\u002Fh1><p class=\"sub\">From a five-year vision down to the next 30 days.<\u002Fp>\n      ${HORIZONS.map(h=>{const gs=S.goals.filter(g=>g.horizon===h);if(!gs.length)return'';return`<div class=\"section\"><span class=\"eyebrow\">${h}<\u002Fspan><div class=\"stagger\" style=\"margin-top:10px\">${gs.map(g=>{const linked=S.projects.filter(p=>p.goalId===g.id).length;return`<div class=\"goal-item\"><div class=\"g-title\">${esc(g.title)}<\u002Fdiv><div class=\"g-meta\">${linked?linked+' linked project'+(linked>1?'s':'')+(g.target?' · ':''):''}${g.target?fmtDate(g.target):''}<\u002Fdiv><div class=\"progress\"><i style=\"width:${g.progress||0}%\"><\u002Fi><\u002Fdiv><\u002Fdiv>`;}).join('')}<\u002Fdiv><\u002Fdiv>`;}).join('')||`<div class=\"card empty section\"><div class=\"glyph\">◎<\u002Fdiv><p>A life without written goals drifts. Set your first horizon.<\u002Fp><button class=\"btn btn-ink\" onclick=\"sheetGoal()\">Set a goal<\u002Fbutton><\u002Fdiv>`}`;\n\n    V.projects=()=>{\n      const r=route().split('/');if(r[1]) return projectDetail(r[1]);\n      return `<span class=\"eyebrow\">Projects<\u002Fspan><h1 class=\"page\">Things in motion.<\u002Fh1><p class=\"sub\">Each project carries its own tasks, budget and notes.<\u002Fp>\n      <div class=\"card rowlist stagger\" style=\"margin-top:16px\">${S.projects.length?S.projects.map(p=>{const ts=p.tasks||[],done=ts.filter(t=>t.done).length,g=S.goals.find(g=>g.id===p.goalId);return`<button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"go('projects/${p.id}')\"><div class=\"grow\"><div class=\"title\">${esc(p.title)}<\u002Fdiv><div class=\"meta\">${done}/${ts.length} tasks${g?' · serves \"'+esc(g.title)+'\"':''}${p.budget?' · '+fmtMoney(p.spent||0)+' of '+fmtMoney(p.budget):''}<\u002Fdiv><div class=\"progress\" style=\"margin-top:6px\"><i style=\"width:${ts.length?Math.round(done/ts.length*100):0}%\"><\u002Fi><\u002Fdiv><\u002Fdiv><span class=\"chip ${p.status==='Done'?'green':p.status==='On hold'?'':'brass'}\">${p.status||'Active'}<\u002Fspan><\u002Fbutton>`;}).join(''):`<div class=\"empty\"><div class=\"glyph\">◻<\u002Fdiv><p>Turn goals into motion. Start your first project.<\u002Fp><button class=\"btn btn-ink\" onclick=\"sheetProject()\">Start a project<\u002Fbutton><\u002Fdiv>`}<\u002Fdiv>`;\n    };\n\n    function taskRow(t,pid){return `<div class=\"row ${t.done?'done':''}\" id=\"tr-${t.id}\"><button class=\"check ${t.done?'on':''}\" id=\"ck-${t.id}\" onclick=\"toggleTask('${pid}','${t.id}')\" aria-label=\"Toggle task\"><svg viewBox=\"0 0 24 24\"><path d=\"M5 12.5l4.5 4.5L19 7.5\"/><\u002Fsvg><\u002Fbutton><div class=\"grow\"><div class=\"title\">${esc(t.title)}<\u002Fdiv><div class=\"meta\">${t.project?esc(t.project):''}${t.due?(t.project?' · ':'')+'due '+fmtDate(t.due):''}<\u002Fdiv><\u002Fdiv>${t.due&&!t.done&&daysUntil(t.due)<0?'<span class=\"chip red\">follow up<\u002Fspan>':''}<\u002Fdiv>`;}\n\n    function toggleTask(pid,tid){\n      const p=S.projects.find(p=>p.id===pid);if(!p)return;\n      const t=(p.tasks||[]).find(t=>t.id===tid);if(!t)return;\n      t.done=!t.done;t.doneAt=t.done?Date.now():null;\n      if(t.done){log('Completed \"'+t.title+'\"');const el=document.getElementById('ck-'+tid);burst(el);}\n      save();\n      const row=document.getElementById('tr-'+tid);\n      if(row){const check=row.querySelector('.check');if(check) check.classList.toggle('on',t.done);if(t.done){row.classList.add('done');setTimeout(()=>render(),450);}else{row.classList.remove('done');render();}}else render();\n    }\n\n    function projectDetail(id){\n      const p=S.projects.find(p=>p.id===id);\n      if(!p)return`<button class=\"backlink\" onclick=\"go('projects')\">‹ All projects<\u002Fbutton><div class=\"card empty section\"><p>Project not found.<\u002Fp><\u002Fdiv>`;\n      const ts=p.tasks||[],done=ts.filter(t=>t.done).length,g=S.goals.find(g=>g.id===p.goalId);\n      return `<button class=\"backlink\" onclick=\"go('projects')\">‹ All projects<\u002Fbutton><span class=\"eyebrow\">Project<\u002Fspan>\n      <div class=\"hgroup\"><h1 class=\"page\">${esc(p.title)}<\u002Fh1><button class=\"iconbtn\" onclick=\"sheetProject('${p.id}')\">${I.edit}<\u002Fbutton><\u002Fdiv>\n      <p class=\"sub\">${g?'Serves \"'+esc(g.title)+'\" · ':''}${p.status||'Active'}<\u002Fp>\n      ${p.budget?`<div class=\"grid2 section\"><div class=\"stat\"><div class=\"k\">Budget<\u002Fdiv><div class=\"v\">${fmtMoney(p.budget)}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">Spent<\u002Fdiv><div class=\"v\" style=\"color:${(p.spent||0)>p.budget?'var(--signal)':'inherit'}\">${fmtMoney(p.spent||0)}<\u002Fdiv><\u002Fdiv><\u002Fdiv>`:''}\n      <div class=\"section\"><div class=\"hgroup\"><span class=\"eyebrow\" style=\"flex:1\">Tasks · ${done}/${ts.length}<\u002Fspan><\u002Fdiv>\n        <div class=\"card rowlist stagger\" style=\"margin-top:10px\">${ts.length?ts.map(t=>taskRow(t,p.id)).join(''):`<div class=\"empty\"><p>No tasks yet. Break this down into next moves.<\u002Fp><\u002Fdiv>`}<\u002Fdiv>\n        <button class=\"btn btn-ghost\" style=\"margin-top:10px;width:100%\" onclick=\"sheetTask('${p.id}')\">+ Add task<\u002Fbutton>\n      <\u002Fdiv>\n      ${p.notes?`<div class=\"section\"><span class=\"eyebrow\">Notes<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px;white-space:pre-wrap;font-size:14px;line-height:1.7;color:var(--b2)\">${esc(p.notes)}<\u002Fdiv><\u002Fdiv>`:''}`;\n    }\n\n    V.home=()=>listMod({eyebrow:'Home Management',title:'The household ledger.',sub:'Maintenance, appliances, warranties and utilities.',items:S.home,sheet:'sheetHome',empty:'Track the HVAC filter, roof, water heater. Your house stops surprising you.',row:h=>`<div class=\"grow\"><div class=\"title\">${esc(h.item)}<\u002Fdiv><div class=\"meta\">${esc(h.category||'General')}${h.lastService?' · last '+fmtDate(h.lastService):''}${h.warrantyUntil?' · warranty to '+fmtDate(h.warrantyUntil):''}<\u002Fdiv><\u002Fdiv>${h.nextDue?`<span class=\"chip ${daysUntil(h.nextDue)<0?'red':daysUntil(h.nextDue)<=14?'brass':''}\">${daysUntil(h.nextDue)<0?'overdue':'due '+fmtDate(h.nextDue)}<\u002Fspan>`:''}<button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetHome('${h.id}')\" style=\"flex:none\">${I.edit}<\u002Fbutton>`});\n    V.vehicles=()=>listMod({eyebrow:'Vehicles',title:'The garage.',sub:'Service history, insurance, registration and running costs.',items:S.vehicles,sheet:'sheetVehicle',empty:'Track service intervals, renewals and what it really costs to run.',row:v=>{const cost=(v.services||[]).reduce((a,s)=>a+Number(s.cost||0),0);return`<div class=\"grow\"><div class=\"title\">${esc(v.name)}<\u002Fdiv><div class=\"meta mono\">${v.odometer?Number(v.odometer).toLocaleString()+' mi':''}${cost?' · '+fmtMoney(cost)+' lifetime':''}<\u002Fdiv><div class=\"meta\">${v.insurance?'Ins '+fmtDate(v.insurance):''}${v.registration?' · Reg '+fmtDate(v.registration):''}<\u002Fdiv><\u002Fdiv><button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetService('${v.id}')\" style=\"flex:none\">${I.plus}<\u002Fbutton><button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetVehicle('${v.id}')\" style=\"flex:none\">${I.edit}<\u002Fbutton>`;}});\n\n    V.vault=()=>{\n      const locked=S.vaultSalt&&!vaultUnlocked();\n      return `<span class=\"eyebrow\">Document Vault<\u002Fspan><div class=\"hgroup\"><h1 class=\"page\">On record, on hand.<\u002Fh1>${vaultUnlocked()?`<button class=\"iconbtn\" onclick=\"lockVault()\">${I.lock}<\u002Fbutton>`:''}<\u002Fdiv>\n      <p class=\"sub\">Scan any document — Keptly reads the expiry date automatically. Encrypted on this device.<\u002Fp>\n      <div style=\"display:flex;flex-direction:column;gap:9px;margin-top:14px\">\n        <button class=\"btn btn-brass\" style=\"width:100%\" onclick=\"startScan()\">${I.scan}Scan a document<\u002Fbutton>\n        <button class=\"btn btn-ghost\" style=\"width:100%\" onclick=\"dropAnything()\">${I.upload}Drop a PDF or image<\u002Fbutton>\n        <button class=\"btn-quiet\" style=\"width:100%;text-align:center\" onclick=\"sheetDoc()\">Add manually<\u002Fbutton>\n      <\u002Fdiv>\n      ${locked?`<div class=\"section card empty\"><div class=\"glyph\">🔒<\u002Fdiv><p>Your vault is locked. Unlock to view encrypted documents.<\u002Fp><button class=\"btn btn-ink\" onclick=\"sheetUnlock()\">Unlock vault<\u002Fbutton><\u002Fdiv>`:`<div class=\"section card rowlist stagger\">${S.vault.length?S.vault.map(d=>`<div class=\"row\"><div class=\"grow\"><div class=\"title\">${esc(d.title)}${d.scan?` <span class=\"chip\" style=\"font-size:9px\">scan<\u002Fspan>`:''}<\u002Fdiv><div class=\"meta\">${esc(d.category)}${d.ref?' · ':''}<span class=\"mono\">${esc(d.ref||'')}<\u002Fspan><\u002Fdiv><\u002Fdiv>${d.expires?`<span class=\"chip ${daysUntil(d.expires)<0?'red':daysUntil(d.expires)<=30?'brass':''}\">${daysUntil(d.expires)<0?'expired':'to '+fmtDate(d.expires)}<\u002Fspan>`:''}<div style=\"display:flex;gap:5px\">${d.scan?`<button class=\"iconbtn\" onclick=\"viewScan('${d.id}')\">${I.eye}<\u002Fbutton>`:''}<button class=\"iconbtn\" onclick=\"sheetDoc('${d.id}')\">${I.edit}<\u002Fbutton><\u002Fdiv><\u002Fdiv>`).join(''):`<div class=\"empty\"><div class=\"glyph\">◻<\u002Fdiv><p>Scan your passport, insurance card or warranty. Keptly fills in the details and tracks the expiry.<\u002Fp><\u002Fdiv>`}<\u002Fdiv>`}`;\n    };\n\n    V.family=()=>listMod({eyebrow:'Family Hub',title:'Your people.',sub:'Contacts, medical notes and who to call when it matters.',items:S.family,sheet:'sheetPerson',empty:'Add household members and emergency contacts. They surface in Emergency Mode.',row:f=>`<div class=\"grow\"><div class=\"title\">${esc(f.name)}<\u002Fdiv><div class=\"meta\">${esc(f.relation||'')}${f.phone?' · ':''}<span class=\"mono\">${esc(f.phone||'')}<\u002Fspan>${f.medical?' · '+esc(f.medical):''}<\u002Fdiv><\u002Fdiv>${f.emergency?'<span class=\"chip red\">ICE<\u002Fspan>':''}<button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetPerson('${f.id}')\" style=\"flex:none\">${I.edit}<\u002Fbutton>`});\n    V.insurance=()=>listMod({eyebrow:'Insurance',title:'Covered, and proof of it.',sub:'Every policy, its number, and when it renews.',items:S.insurance||[],sheet:'sheetInsurance',empty:'Add health, auto, home or life policies. Renewal dates flow into Watch.',row:p=>`<div class=\"grow\"><div class=\"title\">${esc(p.name)}<\u002Fdiv><div class=\"meta\">${esc(p.type||'Policy')}${p.provider?' · '+esc(p.provider):''}${p.policy?' · ':''}<span class=\"mono\">${esc(p.policy||'')}<\u002Fspan><\u002Fdiv><\u002Fdiv>${p.renews?`<span class=\"chip ${daysUntil(p.renews)<0?'red':daysUntil(p.renews)<=30?'brass':''}\">${daysUntil(p.renews)<0?'lapsed':'renews '+fmtDate(p.renews)}<\u002Fspan>`:''}<button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetInsurance('${p.id}')\" style=\"flex:none\">${I.edit}<\u002Fbutton>`});\n    V.medical=()=>listMod({eyebrow:'Medical',title:'Health, on the record.',sub:'Conditions, medications, allergies and providers.',items:S.medical||[],sheet:'sheetMedical',empty:'Add medications, allergies or conditions. Critical entries appear in Emergency Mode.',row:m=>`<div class=\"grow\"><div class=\"title\">${esc(m.label)}${m.critical?` <span class=\"chip red\">critical<\u002Fspan>`:''}<\u002Fdiv><div class=\"meta\">${esc(m.type||'')}${m.detail?' · '+esc(m.detail):''}${m.person?' · '+esc(m.person):''}<\u002Fdiv><\u002Fdiv><button class=\"iconbtn\" onclick=\"event.stopPropagation();sheetMedical('${m.id}')\" style=\"flex:none\">${I.edit}<\u002Fbutton>`});\n\n    V.legacy=()=>{\n      const L=S.legacy;\n      const field=(k,label,hint)=>`<div class=\"section\"><span class=\"eyebrow\">${label}<\u002Fspan><button class=\"card pad\" style=\"width:100%;text-align:left;margin-top:10px;cursor:pointer;transition:background .18s\" onclick=\"sheetLegacyText('${k}','${label}')\" onmouseover=\"this.style.background='var(--s2)'\" onmouseout=\"this.style.background=''\">${L[k]?`<p style=\"font-size:14px;white-space:pre-wrap;color:var(--b2);line-height:1.65\">${esc(L[k])}<\u002Fp>`:`<p class=\"sub\" style=\"margin:0\">${hint}<\u002Fp>`}<\u002Fbutton><\u002Fdiv>`;\n      return `<span class=\"eyebrow\">Digital Legacy<\u002Fspan><h1 class=\"page\">If something happens.<\u002Fh1><p class=\"sub\">The hardest thing to leave your family is clarity. Prepare it here, ahead of time.<\u002Fp>\n      <div class=\"section\"><span class=\"eyebrow\">Trusted contacts<\u002Fspan><div class=\"card rowlist stagger\" style=\"margin-top:10px\">\n        ${L.contacts.length?L.contacts.map(c=>`<div class=\"row\"><div class=\"grow\"><div class=\"title\">${esc(c.name)}<\u002Fdiv><div class=\"meta\">${esc(c.relation||'')}${c.phone?' · ':''}<span class=\"mono\">${esc(c.phone||'')}<\u002Fspan><\u002Fdiv><\u002Fdiv><button class=\"iconbtn\" onclick=\"delLegacyContact('${c.id}')\">${I.trash}<\u002Fbutton><\u002Fdiv>`).join(''):'<div class=\"empty\" style=\"padding:18px\"><p>No trusted contacts yet.<\u002Fp><\u002Fdiv>'}\n        <button class=\"row\" style=\"width:100%;text-align:left;color:var(--brass)\" onclick=\"sheetLegacyContact()\"><div class=\"grow\"><div class=\"title\" style=\"color:var(--brass)\">+ Add trusted contact<\u002Fdiv><\u002Fdiv><\u002Fbutton>\n      <\u002Fdiv><\u002Fdiv>\n      ${field('wishes','Wishes & instructions','Funeral preferences, messages, account guidance.')}\n      ${field('assets','Where things are','Accounts, property, insurance — where to find them.')}\n      ${field('documents','Key documents','Where your will, deeds and titles are kept.')}\n      <div class=\"section card pad\" style=\"background:var(--brass-t);border-color:rgba(194,149,74,.2)\"><p style=\"font-size:13px;color:var(--b2)\">This is the most private part of Keptly. It stays on your device. Share access deliberately, through the trusted contacts above.<\u002Fp><\u002Fdiv>`;\n    };\n\n    V.finance=()=>{\n      const F=S.finance;\n      const monthly=F.bills.reduce((a,b)=>a+Number(b.amount||0),0)+F.subs.reduce((a,s)=>a+(s.cycle==='Yearly'?Number(s.amount||0)/12:Number(s.amount||0)),0);\n      const debt=F.debts.reduce((a,d)=>a+Number(d.balance||0),0),assets=F.assets.reduce((a,x)=>a+Number(x.value||0),0);\n      const sec=(name,items,row,addFn)=>`<div class=\"section\"><div class=\"hgroup\"><span class=\"eyebrow\" style=\"flex:1\">${name}<\u002Fspan><button class=\"btn-quiet\" onclick=\"${addFn}()\">+ Add<\u002Fbutton><\u002Fdiv>${items.length?`<div class=\"card rowlist stagger\" style=\"margin-top:8px\">${items.map(row).join('')}<\u002Fdiv>`:''}<\u002Fdiv>`;\n      return `<span class=\"eyebrow\">Finance Center<\u002Fspan><h1 class=\"page\">Know your numbers.<\u002Fh1><p class=\"sub\">Bills, subscriptions, debts and assets. No bank login required.<\u002Fp>\n      <div class=\"grid2 section stagger\"><div class=\"stat\"><div class=\"k\">Monthly fixed<\u002Fdiv><div class=\"v\">${fmtMoney(monthly)}<\u002Fdiv><\u002Fdiv><div class=\"stat\"><div class=\"k\">Net position<\u002Fdiv><div class=\"v\" style=\"color:${assets-debt<0?'var(--signal)':'var(--verdant)'}\">${fmtMoney(assets-debt)}<\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      ${sec('Bills',F.bills,b=>`<div class=\"netline\"><span>${esc(b.name)}<span style=\"display:block;font-size:12px;color:var(--b3)\">day ${esc(b.dueDay||'—')}${b.autopay?' · autopay':''}<\u002Fspan><\u002Fspan><b>${fmtMoney(b.amount)}<\u002Fb><\u002Fdiv>`,'sheetBill')}\n      ${sec('Subscriptions',F.subs,s=>`<div class=\"netline\"><span>${esc(s.name)}<span style=\"display:block;font-size:12px;color:var(--b3)\">${esc(s.cycle||'Monthly')}<\u002Fspan><\u002Fspan><b>${fmtMoney(s.amount)}<\u002Fb><\u002Fdiv>`,'sheetSub')}\n      ${sec('Debts',F.debts,d=>`<div class=\"netline\"><span>${esc(d.name)}<span style=\"display:block;font-size:12px;color:var(--b3)\">${d.rate?esc(d.rate)+'% APR':''}<\u002Fspan><\u002Fspan><b style=\"color:var(--signal)\">${fmtMoney(d.balance)}<\u002Fb><\u002Fdiv>`,'sheetDebt')}\n      ${sec('Assets',F.assets,a=>`<div class=\"netline\"><span>${esc(a.name)}<\u002Fspan><b style=\"color:var(--verdant)\">${fmtMoney(a.value)}<\u002Fb><\u002Fdiv>`,'sheetAsset')}`;\n    };\n\n    function listMod({eyebrow,title,sub,items,row,empty,sheet}){\n      return `<span class=\"eyebrow\">${eyebrow}<\u002Fspan><h1 class=\"page\">${title}<\u002Fh1><p class=\"sub\">${sub}<\u002Fp>\n      <div class=\"card rowlist stagger\" style=\"margin-top:16px\">${items.length?items.map(it=>`<div class=\"row\">${row(it)}<\u002Fdiv>`).join(''):`<div class=\"empty\"><div class=\"glyph\">◻<\u002Fdiv><p>${empty}<\u002Fp><button class=\"btn btn-ink\" onclick=\"${sheet}()\">Add the first<\u002Fbutton><\u002Fdiv>`}<\u002Fdiv>`;\n    }\n\n    V.trust=()=>{\n      const scans=S.vault.filter(d=>d.scan).length;const lastBak=S.lastBackup?new Date(S.lastBackup).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'Never';\n      const vaultState=S.vaultSalt?(vaultUnlocked()?'Unlocked this session':'Locked'):'Not set up yet';\n      const line=(k,v,good)=>`<div class=\"netline\"><span style=\"color:var(--b2)\">${k}<\u002Fspan><b style=\"color:${good===false?'var(--signal)':good?'var(--verdant)':'var(--b)'};font-family:var(--font-b);font-weight:600\">${v}<\u002Fb><\u002Fdiv>`;\n      return `<button class=\"backlink\" onclick=\"go('settings')\">‹ Settings<\u002Fbutton><span class=\"eyebrow\">Trust & Security<\u002Fspan><h1 class=\"page\">Your data, your rules.<\u002Fh1>\n      <div class=\"section\"><span class=\"eyebrow\">Status<\u002Fspan><div class=\"card rowlist\" style=\"margin-top:10px\">${line('Encrypted documents',scans+' scan'+(scans===1?'':'s')+' · AES-256',scans>0)}${line('Vault passphrase',vaultState,!!S.vaultSalt)}${line('Cloud sync',isPremium()?'On — synced':'Off — on this device',isPremium())}${line('Last backup',lastBak,!!S.lastBackup)}<\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Commitments<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px\"><p style=\"font-size:13.5px;color:var(--b2);line-height:2.1\">No advertising, ever.<br>No selling your data, ever.<br>No training AI on your data.<br>Free export, always.<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Your data<\u002Fspan><div class=\"card rowlist\" style=\"margin-top:10px\"><button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"exportBackup()\"><div class=\"grow\"><div class=\"title\">Download all my data<\u002Fdiv><div class=\"meta\">Unencrypted JSON backup<\u002Fdiv><\u002Fdiv><span class=\"chip\">Export<\u002Fspan><\u002Fbutton><button class=\"row\" style=\"width:100%;text-align:left;color:var(--signal)\" onclick=\"eraseAll()\"><div class=\"grow\"><div class=\"title\" style=\"color:var(--signal)\">Erase everything on this device<\u002Fdiv><div class=\"meta\">Permanent — download first<\u002Fdiv><\u002Fdiv><\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n    };\n\n    V.settings=()=>{\n      const counts=S.goals.length+S.projects.length+S.home.length+S.vehicles.length+S.vault.length+S.family.length;\n      return `<span class=\"eyebrow\">Settings<\u002Fspan><h1 class=\"page\">Your Keptly.<\u002Fh1>\n      <p class=\"sub\">${isPremium()?'Backed up and synced across your devices.':'Everything lives on this device until you say otherwise.'}<\u002Fp>\n      ${accountCard()}\n      <div class=\"section\"><span class=\"eyebrow\">Profile<\u002Fspan><div class=\"card rowlist\" style=\"margin-top:10px\"><div class=\"row\"><div class=\"grow\"><div class=\"title\">${esc(S.profile.name)||'No name set'}<\u002Fdiv><div class=\"meta\">Shown in your dashboard greeting<\u002Fdiv><\u002Fdiv><button class=\"iconbtn\" onclick=\"sheetProfile()\">${I.edit}<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Backup & Restore<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px\"><p style=\"font-size:13.5px;color:var(--b2);margin-bottom:14px\">Your life record — <b style=\"color:var(--b)\">${counts} items<\u002Fb> — is stored in this browser.<\u002Fp><div style=\"display:flex;gap:9px;flex-wrap:wrap\"><button class=\"btn btn-ink\" onclick=\"exportBackup()\" style=\"flex:1;min-width:120px\">Download backup<\u002Fbutton><button class=\"btn btn-ghost\" onclick=\"document.getElementById('restorefile').click()\" style=\"flex:1;min-width:120px\">Restore backup<\u002Fbutton><\u002Fdiv><input type=\"file\" id=\"restorefile\" accept=\".json\" style=\"display:none\" onchange=\"restoreBackup(this)\"><p style=\"margin-top:10px;font-size:12px;color:var(--b3)\">${S.lastBackup?'Last backup: '+new Date(S.lastBackup).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'}):'No backup yet.'}<\u002Fp><\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Trust & Security<\u002Fspan><div class=\"card rowlist\" style=\"margin-top:10px\"><button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"go('trust')\"><div class=\"grow\"><div class=\"title\">Privacy & Security Center<\u002Fdiv><div class=\"meta\">Encryption, AI, your commitments<\u002Fdiv><\u002Fdiv><span class=\"chip green\">Protected<\u002Fspan><\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Explore<\u002Fspan><div class=\"card rowlist\" style=\"margin-top:10px\"><button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"startTour()\"><div class=\"grow\"><div class=\"title\">Take the guided tour<\u002Fdiv><div class=\"meta\">A 60-second walkthrough<\u002Fdiv><\u002Fdiv><span class=\"chip\">Start<\u002Fspan><\u002Fbutton><button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"if(confirm('Load sample data?'))loadSample()\"><div class=\"grow\"><div class=\"title\">Load sample data<\u002Fdiv><div class=\"meta\">See Keptly filled in<\u002Fdiv><\u002Fdiv><span class=\"chip brass\">Demo<\u002Fspan><\u002Fbutton><\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Nature Mode<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px;background:linear-gradient(135deg,rgba(34,201,148,.08),rgba(80,160,220,.08));border-color:rgba(34,201,148,.22)\">\n        <div style=\"display:flex;align-items:center;justify-content:space-between;gap:14px;flex-wrap:wrap\">\n          <div style=\"flex:1\"><div style=\"font-weight:700;font-size:15px;color:var(--b)\">Nature environments<\u002Fdiv><div style=\"font-size:13px;color:var(--b3);margin-top:3px\">Each screen becomes a living landscape — dawn, ocean, forest, cosmos and more. Responds to your cursor.<\u002Fdiv><\u002Fdiv>\n          <button class=\"nature-badge ${natureOn?'':'off'}\" onclick=\"${isPremium()?'toggleNature()':'upsellNature()'}\">${isPremium()?(natureOn?'✦ On':'○ Off'):'✦ Premium'}<\u002Fbutton>\n        <\u002Fdiv>\n        ${!isPremium()?`<p style=\"font-size:12.5px;color:var(--brass);margin-top:10px\">Upgrade to unlock living nature environments.<\u002Fp>`:''}\n      <\u002Fdiv><\u002Fdiv>\n      <div class=\"section\"><span class=\"eyebrow\">Danger Zone<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px\"><button class=\"btn btn-ghost\" style=\"color:var(--signal);width:100%\" onclick=\"eraseAll()\">Erase everything on this device<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n    };\n\n    function sheetProfile(){openSheet(`<h3>Your name<\u002Fh3>${FLD('pr_n','Name','text',S.profile.name)}${ACTIONS('saveProfile()')}`)}\n    function saveProfile(){S.profile.name=fval('pr_n');save();closeSheet();render();toast('Saved');}\n\n    function exportBackup(){const blob=new Blob([JSON.stringify({app:'Keptly',schema:1,exportedAt:new Date().toISOString(),data:S},null,2)],{type:'application/json'});const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='keptly-backup-'+todayISO()+'.json';document.body.appendChild(a);a.click();a.remove();setTimeout(()=>URL.revokeObjectURL(a.href),4000);S.lastBackup=Date.now();save();render();toast('Backup downloaded');}\n    function restoreBackup(input){const file=input.files&&input.files[0];if(!file)return;const reader=new FileReader();reader.onload=()=>{try{const p=JSON.parse(reader.result);const d=p&&(p.app==='Keptly'||p.app==='AVENOR')&&p.data?p.data:p;if(!d||typeof d!=='object'||!('goals' in d)) throw new Error('shape');if(!confirm('Replace everything with this backup?')){input.value='';return;}S=Object.assign(blank(),d);S.finance=Object.assign({bills:[],subs:[],debts:[],assets:[]},S.finance||{});save();render();toast('Backup restored');}catch(e){toast('Not a valid Keptly backup');}input.value='';};reader.readAsText(file);}\n    function eraseAll(){if(!confirm('Erase ALL Keptly data? Download a backup first.'))return;if(!confirm('Last check — permanently delete everything?'))return;S=blank();save();go('today');render();toast('Everything erased');}\n\n    // ---- CLOUD ----\n    let sb=null,sbSession=null,sbProfile=null,pushTimer=null,syncState='off';\n    function cloudConfigured(){return!window.__noSupabase&&typeof window.supabase!=='undefined'&&window.KEPTLY_CONFIG&&KEPTLY_CONFIG.SUPABASE_URL&&KEPTLY_CONFIG.SUPABASE_ANON_KEY;}\n    function isPremium(){return!!(sbProfile&&(sbProfile.status==='active'||sbProfile.status==='trialing'));}\n    function countItems(st){return st.goals.length+st.projects.length+st.home.length+st.vehicles.length+st.vault.length+st.family.length+st.finance.bills.length+st.finance.subs.length+st.finance.debts.length+st.finance.assets.length;}\n    async function cloudInit(){if(!cloudConfigured()) return;sb=window.supabase.createClient(KEPTLY_CONFIG.SUPABASE_URL,KEPTLY_CONFIG.SUPABASE_ANON_KEY);const{data:{session}}=await sb.auth.getSession();sbSession=session;sb.auth.onAuthStateChange((_evt,s)=>{const wasOut=!sbSession;sbSession=s;if(s&&wasOut)afterLogin();if(!s){sbProfile=null;syncState='off';render();}});if(sbSession)await afterLogin();else render();}\n    async function afterLogin(){try{await refreshProfile();if(isPremium())await firstSync();}catch(e){console.error(e);}render();}\n    async function refreshProfile(){if(!sb||!sbSession)return;const{data}=await sb.from('profiles').select('*').eq('id',sbSession.user.id).single();sbProfile=data||null;}\n    async function firstSync(){syncState='syncing';render();const{data,error}=await sb.from('user_state').select('data,updated_at').eq('user_id',sbSession.user.id).maybeSingle();if(error){syncState='error';render();return;}if(!data){await pushNow();return;}if(!countItems(S)){S=Object.assign(blank(),data.data);S.finance=Object.assign({bills:[],subs:[],assets:[],debts:[]},S.finance||{});save();syncState='synced';render();toast('Restored from cloud');return;}openSheet(`<h3>Two versions found<\u002Fh3><p style=\"font-size:13.5px;color:var(--b3);margin:-4px 0 16px\">Both this device and your cloud have Keptly data.<\u002Fp><div class=\"actions\" style=\"flex-direction:column\"><button class=\"btn btn-ink\" onclick=\"resolveSync('local')\">Keep this device (${countItems(S)} items)<\u002Fbutton><button class=\"btn btn-ghost\" onclick=\"resolveSync('cloud')\">Keep cloud (synced ${new Date(data.updated_at).toLocaleDateString()})<\u002Fbutton><\u002Fdiv>`);window._cloudData=data.data;}\n    async function resolveSync(which){closeSheet();if(which==='cloud'){S=Object.assign(blank(),window._cloudData||{});S.finance=Object.assign({bills:[],subs:[],assets:[],debts:[]},S.finance||{});save();syncState='synced';render();toast('Cloud version restored');}else{await pushNow();toast('Uploaded');}window._cloudData=null;}\n    function schedulePush(){if(!sb||!sbSession||!isPremium())return;syncState='syncing';clearTimeout(pushTimer);pushTimer=setTimeout(pushNow,1800);}\n    async function pushNow(){if(!sb||!sbSession||!isPremium())return;const{error}=await sb.from('user_state').upsert({user_id:sbSession.user.id,data:S,updated_at:new Date().toISOString()});syncState=error?'error':'synced';const el=document.getElementById('syncline');if(el)el.textContent=syncLabel();}\n    function syncLabel(){return{off:'Sync off',idle:'Sync ready',syncing:'Syncing…',synced:'All changes synced',error:'Sync error — will retry'}[syncState];}\n\n    function sheetSignIn(mode){\n      const m=mode||'in';\n      openSheet(`<h3>${m==='up'?'Create account':'Log in'}<\u002Fh3><p style=\"font-size:13.5px;color:var(--b3);margin:-4px 0 16px\">${m==='up'?'Start free — we email you a secure 6-digit code.':'Enter your email and we\\'ll send a sign-in code.'}<\u002Fp>${FLD('si_e','Email','email','','you@example.com')}<div class=\"actions\"><button class=\"btn btn-ink\" onclick=\"sendCode('${m}')\">${m==='up'?'Create account':'Send my code'}<\u002Fbutton><\u002Fdiv><div style=\"text-align:center;margin-top:12px;font-size:13px;color:var(--b3)\">${m==='up'?`Already have an account? <button onclick=\"sheetSignIn('in')\" style=\"color:var(--brass);font-weight:600\">Log in<\u002Fbutton>`:`New to Keptly? <button onclick=\"sheetSignIn('up')\" style=\"color:var(--brass);font-weight:600\">Create account<\u002Fbutton>`}<\u002Fdiv>`);\n      setTimeout(()=>document.getElementById('si_e')?.focus(),120);\n    }\n    async function sendCode(mode){const email=fval('si_e');if(!email||!email.includes('@')) return toast('Enter a valid email');const{error}=await sb.auth.signInWithOtp({email,options:{shouldCreateUser:true}});if(error) return toast(error.message||'Could not send code');openSheet(`<h3>Check your email<\u002Fh3><p style=\"font-size:13.5px;color:var(--b3);margin:-4px 0 16px\">We sent a 6-digit code to <b style=\"color:var(--b)\">${esc(email)}<\u002Fb>.<\u002Fp>${FLD('si_c','6-digit code','text','','123456')}<div class=\"actions\"><button class=\"btn btn-ink\" onclick=\"verifyCode('${esc(email)}')\">Log in<\u002Fbutton><\u002Fdiv>`);setTimeout(()=>document.getElementById('si_c')?.focus(),120);}\n    async function verifyCode(email){const token=fval('si_c');if(!token)return toast('Enter the code');const{error}=await sb.auth.verifyOtp({email,token,type:'email'});if(error)return toast('That code didn\\'t work');closeSheet();toast('Signed in!');}\n    async function signOut(){await sb.auth.signOut();toast('Signed out');}\n    async function startCheckout(interval){if(!sbSession)return sheetSignIn();toast('Opening checkout…');try{const r=await fetch('/api/create-checkout-session',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+sbSession.access_token},body:JSON.stringify({interval})});const j=await r.json();if(j.url)location.href=j.url;else toast(j.error||'Checkout unavailable');}catch(e){toast('Checkout unavailable');}}\n    async function openPortal(){try{const r=await fetch('/api/create-portal-session',{method:'POST',headers:{'Authorization':'Bearer '+sbSession.access_token}});const j=await r.json();if(j.url)location.href=j.url;else toast(j.error||'Portal unavailable');}catch(e){toast('Portal unavailable');}}\n\n    function accountCard(){\n      const plans=`<div class=\"grid2\" style=\"margin-top:10px\"><div class=\"card pad\"><div class=\"chip\" style=\"margin-bottom:7px\">Free<\u002Fdiv><div style=\"font-family:var(--font-d);font-size:28px;color:var(--b)\">$0<\u002Fdiv><p style=\"font-size:12px;color:var(--b3);margin:5px 0 9px\">Everything, one device.<\u002Fp><p style=\"font-size:12px;color:var(--b2);line-height:1.9\">All modules<br>Works offline<br>Emergency Mode<br>25 vault docs<\u002Fp><\u002Fdiv><div class=\"card pad\" style=\"border-color:rgba(194,149,74,.4);background:var(--brass-t)\"><div class=\"chip brass\" style=\"margin-bottom:7px\">Premium<\u002Fdiv><div style=\"font-family:var(--font-d);font-size:28px;color:var(--b)\">$6<span style=\"font-size:13px;color:var(--b3)\">/mo<\u002Fspan><\u002Fdiv><p style=\"font-size:12px;color:var(--b3);margin:5px 0 9px\">or $48/yr · 14-day trial<\u002Fp><p style=\"font-size:12px;color:var(--b2);line-height:1.9\">Cloud backup<br>Multi-device sync<br>Unlimited vault<br>Everything in Free<\u002Fp><\u002Fdiv><\u002Fdiv>`;\n      if(!cloudConfigured()) return`<div class=\"section\"><span class=\"eyebrow\">Subscription<\u002Fspan>${plans}<div class=\"card pad\" style=\"margin-top:10px\"><p style=\"font-size:13px;color:var(--b2)\">Sign-in and sync turn on once Supabase is configured. Until then, Keptly runs free and fully offline.<\u002Fp><\u002Fdiv><\u002Fdiv>`;\n      if(!sbSession) return`<div class=\"section\"><span class=\"eyebrow\">Subscription<\u002Fspan>${plans}<div class=\"card pad\" style=\"margin-top:10px\"><p style=\"font-size:13.5px;color:var(--b2);margin-bottom:13px\">Start your <b style=\"color:var(--b)\">14-day Premium trial<\u002Fb> — free.<\u002Fp><button class=\"btn btn-ink\" style=\"width:100%\" onclick=\"sheetSignIn('up')\">Create free account<\u002Fbutton><button class=\"btn btn-ghost\" style=\"width:100%;margin-top:9px\" onclick=\"sheetSignIn('in')\">Log in<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n      if(!isPremium()) return`<div class=\"section\"><span class=\"eyebrow\">Account & Sync<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px\"><div style=\"display:flex;justify-content:space-between;align-items:center;margin-bottom:7px\"><b style=\"color:var(--b)\">${esc(sbSession.user.email)}<\u002Fb><span class=\"chip\">Free<\u002Fspan><\u002Fdiv><p style=\"font-size:13.5px;color:var(--b2);margin:9px 0 13px\">Upgrade to Premium — <b style=\"color:var(--b)\">14 days free<\u002Fb>.<\u002Fp><div style=\"display:flex;gap:9px;flex-wrap:wrap\"><button class=\"btn btn-brass\" style=\"flex:1;min-width:110px\" onclick=\"startCheckout('monthly')\">$6 / month<\u002Fbutton><button class=\"btn btn-ghost\" style=\"flex:1;min-width:110px\" onclick=\"startCheckout('yearly')\">$48 / year<\u002Fbutton><\u002Fdiv><button class=\"btn-quiet\" style=\"width:100%;margin-top:9px\" onclick=\"signOut()\">Sign out<\u002Fbutton><\u002Fdiv><\u002Fdiv>`;\n      return`<div class=\"section\"><span class=\"eyebrow\">Account & Sync<\u002Fspan><div class=\"card pad\" style=\"margin-top:10px\"><div style=\"display:flex;justify-content:space-between;align-items:center\"><b style=\"color:var(--b)\">${esc(sbSession.user.email)}<\u002Fb><span class=\"chip brass\">Premium${sbProfile.status==='trialing'?' · trial':''}<\u002Fspan><\u002Fdiv><p id=\"syncline\" style=\"margin-top:7px;font-size:12.5px;color:var(--b3)\">${syncLabel()}<\u002Fp><div style=\"display:flex;gap:9px;margin-top:13px;flex-wrap:wrap\"><button class=\"btn btn-ghost\" style=\"flex:1\" onclick=\"openPortal()\">Manage billing<\u002Fbutton><button class=\"btn btn-ghost\" style=\"flex:1\" onclick=\"signOut()\">Sign out<\u002Fbutton><\u002Fdiv><\u002Fdiv><\u002Fdiv>`;\n    }\n\n    // ---- SHEETS ----\n    const sheetEl=document.getElementById('sheet'),scrimEl=document.getElementById('scrim');\n    function openSheet(html){sheetEl.innerHTML='<div class=\"grab\"><\u002Fdiv>'+html;sheetEl.classList.add('show');scrimEl.classList.add('show');if(matchMedia('(min-width:900px)').matches){const f=sheetEl.querySelector('input,select,textarea');if(f)f.focus();}}\n    function closeSheet(){sheetEl.classList.remove('show');scrimEl.classList.remove('show');}\n    function fval(id){const el=document.getElementById(id);return el?el.value.trim():'';}\n    const FLD=(id,label,type='text',val='',ph='')=>`<div class=\"field\"><label for=\"${id}\">${label}<\u002Flabel><input id=\"${id}\" type=\"${type}\" value=\"${esc(val)}\" placeholder=\"${ph}\"><\u002Fdiv>`;\n    const SEL=(id,label,opts,val)=>`<div class=\"field\"><label for=\"${id}\">${label}<\u002Flabel><select id=\"${id}\">${opts.map(o=>`<option ${o===val?'selected':''}>${o}<\u002Foption>`).join('')}<\u002Fselect><\u002Fdiv>`;\n    const ACTIONS=(saveFn,delFn)=>`<div class=\"actions\">${delFn?`<button class=\"btn btn-ghost\" style=\"color:var(--signal)\" onclick=\"${delFn}\">Delete<\u002Fbutton>`:''}<button class=\"btn btn-ink\" onclick=\"${saveFn}\">Save<\u002Fbutton><\u002Fdiv>`;\n\n    function sheetGoal(id){const g=id?S.goals.find(g=>g.id===id):null;openSheet(`<h3>${g?'Edit goal':'New goal'}<\u002Fh3>${FLD('g_t','Goal','text',g?.title||'','e.g. Own a home')}${SEL('g_h','Horizon',HORIZONS,g?.horizon||'1 year')}${FLD('g_d','Target date','date',g?.target||'')}${FLD('g_p','Progress (0–100)','number',g?.progress??0)}${ACTIONS(`saveGoal('${id||''}')`,g?`delItem('goals','${id}')`:null)}`);}\n    function saveGoal(id){const t=fval('g_t');if(!t)return toast('Give the goal a name');const data={title:t,horizon:fval('g_h'),target:fval('g_d'),progress:Math.min(100,Math.max(0,Number(fval('g_p'))||0))};if(id){Object.assign(S.goals.find(g=>g.id===id),data);}else{S.goals.push({id:uid(),...data});log('Set goal \"'+t+'\"');}save();closeSheet();render();toast('Goal saved');}\n    function sheetProject(id){const p=id?S.projects.find(p=>p.id===id):null;openSheet(`<h3>${p?'Edit project':'New project'}<\u002Fh3>${FLD('p_t','Project','text',p?.title||'','e.g. Buy a house')}${SEL('p_g','Serves goal',['(none)',...S.goals.map(g=>g.title)],p?(S.goals.find(g=>g.id===p.goalId)?.title||'(none)'):'(none)')}${SEL('p_s','Status',['Active','On hold','Done'],p?.status||'Active')}<div class=\"grid2\">${FLD('p_b','Budget $','number',p?.budget||'')}${FLD('p_sp','Spent $','number',p?.spent||'')}<\u002Fdiv><div class=\"field\"><label for=\"p_n\">Notes<\u002Flabel><textarea id=\"p_n\">${esc(p?.notes||'')}<\u002Ftextarea><\u002Fdiv>${ACTIONS(`saveProject('${id||''}')`,p?`delItem('projects','${id}')`:null)}`);}\n    function saveProject(id){const t=fval('p_t');if(!t)return toast('Give the project a name');const gl=S.goals.find(g=>g.title===fval('p_g'));const data={title:t,goalId:gl?gl.id:null,status:fval('p_s'),budget:Number(fval('p_b'))||0,spent:Number(fval('p_sp'))||0,notes:document.getElementById('p_n').value.trim()};if(id){Object.assign(S.projects.find(p=>p.id===id),data);}else{S.projects.push({id:uid(),tasks:[],...data});log('Started \"'+t+'\"');}save();closeSheet();render();toast('Project saved');}\n    function sheetTask(pid){openSheet(`<h3>New task<\u002Fh3>${FLD('t_t','Task','text','','Next concrete move')}${FLD('t_d','Due','date')}${ACTIONS(`saveTask('${pid}')`)}`)}\n    function saveTask(pid){const t=fval('t_t');if(!t)return toast('Name the task');const p=S.projects.find(p=>p.id===pid);p.tasks=p.tasks||[];p.tasks.push({id:uid(),title:t,due:fval('t_d'),done:false});save();closeSheet();render();toast('Task added');}\n    function sheetHome(id){const h=id?S.home.find(x=>x.id===id):null;openSheet(`<h3>${h?'Edit item':'Home item'}<\u002Fh3>${FLD('h_i','Item','text',h?.item||'','e.g. HVAC filter')}${SEL('h_c','Category',['Maintenance','Repair','Appliance','Utility','Property'],h?.category||'Maintenance')}<div class=\"grid2\">${FLD('h_l','Last serviced','date',h?.lastService||'')}${FLD('h_n','Next due','date',h?.nextDue||'')}<\u002Fdiv>${FLD('h_w','Warranty until','date',h?.warrantyUntil||'')}${ACTIONS(`saveHome('${id||''}')`,h?`delItem('home','${id}')`:null)}`);}\n    function saveHome(id){const t=fval('h_i');if(!t)return toast('Name the item');const data={item:t,category:fval('h_c'),lastService:fval('h_l'),nextDue:fval('h_n'),warrantyUntil:fval('h_w')};if(id){Object.assign(S.home.find(x=>x.id===id),data);}else S.home.push({id:uid(),...data});save();closeSheet();render();toast('Saved');}\n    function sheetVehicle(id){const v=id?S.vehicles.find(x=>x.id===id):null;openSheet(`<h3>${v?'Edit vehicle':'Add vehicle'}<\u002Fh3>${FLD('v_n','Vehicle','text',v?.name||'','e.g. 2014 Honda Accord')}${FLD('v_o','Odometer (mi)','number',v?.odometer||'')}<div class=\"grid2\">${FLD('v_i','Insurance renews','date',v?.insurance||'')}${FLD('v_r','Registration renews','date',v?.registration||'')}<\u002Fdiv>${ACTIONS(`saveVehicle('${id||''}')`,v?`delItem('vehicles','${id}')`:null)}`);}\n    function saveVehicle(id){const t=fval('v_n');if(!t)return toast('Name the vehicle');const data={name:t,odometer:fval('v_o'),insurance:fval('v_i'),registration:fval('v_r')};if(id){Object.assign(S.vehicles.find(x=>x.id===id),data);}else S.vehicles.push({id:uid(),services:[],...data});save();closeSheet();render();toast('Vehicle saved');}\n    function sheetService(vid){openSheet(`<h3>Log service<\u002Fh3>${FLD('s_t','Work done','text','','e.g. Oil change, brake pads')}<div class=\"grid2\">${FLD('s_d','Date','date',todayISO())}${FLD('s_c','Cost $','number')}<\u002Fdiv>${FLD('s_o','Odometer (mi)','number')}${ACTIONS(`saveService('${vid}')`)}`)}\n    function saveService(vid){const t=fval('s_t');if(!t)return toast('Describe the work');const v=S.vehicles.find(x=>x.id===vid);v.services=v.services||[];v.services.push({id:uid(),type:t,date:fval('s_d'),cost:Number(fval('s_c'))||0,odo:fval('s_o')});if(fval('s_o'))v.odometer=fval('s_o');save();closeSheet();render();toast('Service logged');}\n\n    let _pendingScan=null;\n    function sheetDoc(id,scan){\n      const d=id?S.vault.find(x=>x.id===id):null;_pendingScan=scan&&scan.scan?scan.scan:(d&&d.scan?d.scan:null);\n      const cat=scan?.category||d?.category||'Identity',ref=scan?.ref||d?.ref||'',exp=scan?.expires||d?.expires||'',title=scan?.title||d?.title||'';\n      const byAI=scan&&scan.ai,conf=byAI&&typeof scan.confidence==='number'?Math.round(scan.confidence*100):null;\n      const detected=scan&&(scan.ref||scan.expires||scan.title)?`<div style=\"background:var(--verdant-t);border:1px solid rgba(34,201,148,.3);border-radius:var(--r-sm);padding:12px 14px;margin-bottom:12px\"><div style=\"font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:var(--verdant);display:flex;justify-content:space-between\"><span>${byAI?'✦ Read by AI':'✓ Read from scan'}<\u002Fspan>${conf!==null?`<span>${conf}%<\u002Fspan>`:''}<\u002Fdiv><p style=\"font-size:12.5px;color:var(--b2);margin-top:4px\">${scan.provider?esc(scan.provider)+'. ':''}${scan.expires?'Expiry '+fmtDate(scan.expires)+'. ':''}${scan.ref?'Ref '+esc(scan.ref)+'.':''}<\u002Fp><\u002Fdiv>`:'';\n      openSheet(`<h3>${d?'Edit document':_pendingScan?'Save scanned document':'Add document'}<\u002Fh3>${detected}${_pendingScan?`<div style=\"text-align:center;margin-bottom:12px\"><img id=\"scanthumb\" style=\"max-height:130px;border-radius:10px;border:1px solid var(--border-2)\" alt=\"scan\"><\u002Fdiv>`:''}<div class=\"field\"><label for=\"d_t\">Document<\u002Flabel><input id=\"d_t\" type=\"text\" value=\"${esc(title)}\" placeholder=\"e.g. Passport\"><\u002Fdiv>${SEL('d_c','Category',VAULT_CATS,cat)}${FLD('d_r','Reference / policy #','text',ref)}${FLD('d_e','Expires','date',exp)}${ACTIONS(`saveDoc('${id||''}')`,d?`delItem('vault','${id}')`:null)}`);\n      if(_pendingScan&&vaultUnlocked()) decryptBlob(_pendingScan).then(u=>{const im=document.getElementById('scanthumb');if(im)im.src=u;}).catch(()=>{});\n    }\n    function saveDoc(id){const t=fval('d_t');if(!t)return toast('Name the document');if(!id&&S.vault.length>=25&&!isPremium()){closeSheet();toast('Free plan: 25 documents max — Premium is unlimited');go('settings');return;}const data={title:t,category:fval('d_c'),ref:fval('d_r'),expires:fval('d_e')};if(_pendingScan)data.scan=_pendingScan;if(id){Object.assign(S.vault.find(x=>x.id===id),data);}else S.vault.push({id:uid(),...data});_pendingScan=null;save();closeSheet();render();toast(data.scan?'Encrypted and filed':'Filed in the vault');}\n    function viewScan(id){if(!vaultUnlocked())return sheetUnlock();const d=S.vault.find(x=>x.id===id);if(!d||!d.scan)return;decryptBlob(d.scan).then(u=>{openSheet(`<h3>${esc(d.title)}<\u002Fh3><img style=\"width:100%;border-radius:10px;border:1px solid var(--border)\" src=\"${u}\" alt=\"${esc(d.title)}\"><div class=\"actions\"><button class=\"btn btn-ghost\" onclick=\"closeSheet()\">Close<\u002Fbutton><\u002Fdiv>`);}).catch(()=>toast('Could not open'));}\n\n    function sheetPerson(id){const f=id?S.family.find(x=>x.id===id):null;openSheet(`<h3>${f?'Edit person':'Add person'}<\u002Fh3>${FLD('f_n','Name','text',f?.name||'')}<div class=\"grid2\">${FLD('f_r','Relation','text',f?.relation||'','Spouse, child…')}${FLD('f_p','Phone','tel',f?.phone||'')}<\u002Fdiv>${FLD('f_m','Medical notes','text',f?.medical||'','Allergies, blood type…')}${SEL('f_e','Emergency contact',['No','Yes'],f?.emergency?'Yes':'No')}${ACTIONS(`savePerson('${id||''}')`,f?`delItem('family','${id}')`:null)}`);}\n    function savePerson(id){const t=fval('f_n');if(!t)return toast('Add a name');const data={name:t,relation:fval('f_r'),phone:fval('f_p'),medical:fval('f_m'),emergency:fval('f_e')==='Yes'};if(id){Object.assign(S.family.find(x=>x.id===id),data);}else S.family.push({id:uid(),...data});save();closeSheet();render();toast('Saved');}\n    function sheetInsurance(id){const p=id?S.insurance.find(x=>x.id===id):null;openSheet(`<h3>${p?'Edit policy':'Add insurance'}<\u002Fh3>${FLD('i_n','Policy name','text',p?.name||'','e.g. Auto — Honda')}${SEL('i_t','Type',['Auto','Health','Home','Life','Renters','Dental','Other'],p?.type||'Auto')}${FLD('i_pr','Provider','text',p?.provider||'')}${FLD('i_po','Policy number','text',p?.policy||'')}${FLD('i_r','Renews / expires','date',p?.renews||'')}${ACTIONS(`saveInsurance('${id||''}')`,p?`delItem('insurance','${id}')`:null)}`);}\n    function saveInsurance(id){const t=fval('i_n');if(!t)return toast('Name the policy');const data={name:t,type:fval('i_t'),provider:fval('i_pr'),policy:fval('i_po'),renews:fval('i_r')};if(id){Object.assign(S.insurance.find(x=>x.id===id),data);}else S.insurance.push({id:uid(),...data});save();closeSheet();render();toast('Policy saved');}\n    function sheetMedical(id){const m=id?S.medical.find(x=>x.id===id):null;const people=['(me)',...S.family.map(f=>f.name)];openSheet(`<h3>${m?'Edit entry':'Add medical info'}<\u002Fh3>${SEL('m_t','Type',['Medication','Allergy','Condition','Provider','Blood type','Vaccination','Other'],m?.type||'Medication')}${FLD('m_l','Label','text',m?.label||'','e.g. Penicillin')}${FLD('m_d','Detail','text',m?.detail||'','dosage, severity…')}${SEL('m_p','Who',people,m?.person||'(me)')}${SEL('m_c','Show in Emergency Mode',['No','Yes'],m?.critical?'Yes':'No')}${ACTIONS(`saveMedical('${id||''}')`,m?`delItem('medical','${id}')`:null)}`);}\n    function saveMedical(id){const t=fval('m_l');if(!t)return toast('Add a label');const data={label:t,type:fval('m_t'),detail:fval('m_d'),person:fval('m_p'),critical:fval('m_c')==='Yes'};if(id){Object.assign(S.medical.find(x=>x.id===id),data);}else S.medical.push({id:uid(),...data});save();closeSheet();render();toast('Saved');}\n    function sheetLegacyText(key,label){openSheet(`<h3>${label}<\u002Fh3><div class=\"field\"><label for=\"lg\">${label}<\u002Flabel><textarea id=\"lg\" style=\"min-height:160px\">${esc(S.legacy[key]||'')}<\u002Ftextarea><\u002Fdiv><div class=\"actions\"><button class=\"btn btn-ink\" onclick=\"S.legacy['${key}']=document.getElementById('lg').value.trim();save();closeSheet();render();toast('Saved')\">Save<\u002Fbutton><\u002Fdiv>`);}\n    function sheetLegacyContact(){openSheet(`<h3>Trusted contact<\u002Fh3>${FLD('lc_n','Name','text','')}<div class=\"grid2\">${FLD('lc_r','Relation','text','')}${FLD('lc_p','Phone','tel','')}<\u002Fdiv><div class=\"actions\"><button class=\"btn btn-ink\" onclick=\"saveLegacyContact()\">Add<\u002Fbutton><\u002Fdiv>`);}\n    function saveLegacyContact(){const n=fval('lc_n');if(!n)return toast('Add a name');S.legacy.contacts.push({id:uid(),name:n,relation:fval('lc_r'),phone:fval('lc_p')});save();closeSheet();render();toast('Added');}\n    function delLegacyContact(id){if(!confirm('Remove this trusted contact?'))return;S.legacy.contacts=S.legacy.contacts.filter(c=>c.id!==id);save();render();}\n\n    const finSheet=(title,fields,saveFn)=>{openSheet(`<h3>${title}<\u002Fh3>${fields}${ACTIONS(saveFn)}`);};\n    function sheetBill(){finSheet('Add bill',FLD('b_n','Bill','text','','Rent, electric…')+`<div class=\"grid2\">${FLD('b_a','Amount $ / mo','number')}${FLD('b_d','Due day','number')}<\u002Fdiv>`+SEL('b_p','Autopay',['No','Yes']),'saveBill()');}\n    function saveBill(){const n=fval('b_n');if(!n)return toast('Name the bill');S.finance.bills.push({id:uid(),name:n,amount:Number(fval('b_a'))||0,dueDay:fval('b_d'),autopay:fval('b_p')==='Yes'});save();closeSheet();render();toast('Bill added');}\n    function sheetSub(){finSheet('Add subscription',FLD('su_n','Service','text')+`<div class=\"grid2\">${FLD('su_a','Amount $','number')}${SEL('su_c','Cycle',['Monthly','Yearly'])}<\u002Fdiv>`,'saveSub()');}\n    function saveSub(){const n=fval('su_n');if(!n)return toast('Name the service');S.finance.subs.push({id:uid(),name:n,amount:Number(fval('su_a'))||0,cycle:fval('su_c')});save();closeSheet();render();toast('Subscription added');}\n    function sheetDebt(){finSheet('Add debt',FLD('de_n','Debt','text','','Car loan, card…')+`<div class=\"grid2\">${FLD('de_b','Balance $','number')}${FLD('de_r','APR %','number')}<\u002Fdiv>`,'saveDebt()');}\n    function saveDebt(){const n=fval('de_n');if(!n)return toast('Name the debt');S.finance.debts.push({id:uid(),name:n,balance:Number(fval('de_b'))||0,rate:fval('de_r')});save();closeSheet();render();toast('Debt added');}\n    function sheetAsset(){finSheet('Add asset',FLD('as_n','Asset','text','','Savings, vehicle…')+FLD('as_v','Value $','number'),'saveAsset()');}\n    function saveAsset(){const n=fval('as_n');if(!n)return toast('Name the asset');S.finance.assets.push({id:uid(),name:n,value:Number(fval('as_v'))||0});save();closeSheet();render();toast('Asset added');}\n    function delItem(coll,id){if(!confirm('Delete permanently?'))return;S[coll]=S[coll].filter(x=>x.id!==id);save();closeSheet();if(route().startsWith('projects/'))go('projects');render();toast('Deleted');}\n\n    // ---- SEARCH ----\n    function searchIndex(){const out=[];S.goals.forEach(g=>out.push({type:'Goal',label:g.title,sub:g.horizon,go:'goals'}));S.projects.forEach(p=>{out.push({type:'Project',label:p.title,sub:p.status||'Active',go:'projects/'+p.id});(p.tasks||[]).forEach(t=>out.push({type:'Task',label:t.title,sub:p.title,go:'projects/'+p.id}));});S.home.forEach(x=>out.push({type:'Home',label:x.item,sub:x.category||'',go:'home'}));S.vehicles.forEach(v=>out.push({type:'Vehicle',label:v.name,sub:'',go:'vehicles'}));S.vault.forEach(d=>out.push({type:'Document',label:d.title,sub:[d.category,d.ref].filter(Boolean).join(' · '),go:'vault'}));S.family.forEach(f=>out.push({type:'Person',label:f.name,sub:f.relation||'',go:'family'}));(S.insurance||[]).forEach(p=>out.push({type:'Insurance',label:p.name,sub:[p.type,p.provider].filter(Boolean).join(' · '),go:'insurance'}));(S.medical||[]).forEach(m=>out.push({type:'Medical',label:m.label,sub:m.type||'',go:'medical'}));S.finance.bills.forEach(b=>out.push({type:'Bill',label:b.name,sub:fmtMoney(b.amount)+'/mo',go:'finance'}));S.finance.subs.forEach(s=>out.push({type:'Subscription',label:s.name,sub:fmtMoney(s.amount),go:'finance'}));return out;}\n    function openSearch(){openSheet(`<h3>Search everything<\u002Fh3>${FLD('q','','text','','Goals, tasks, documents, people…')}<div id=\"qres\" style=\"margin-top:6px\"><\u002Fdiv>`);const inp=document.getElementById('q');inp.setAttribute('autocomplete','off');inp.oninput=()=>renderSearch(inp.value.trim().toLowerCase());renderSearch('');}\n    function renderSearch(q){const box=document.getElementById('qres');if(!box)return;if(!q){box.innerHTML='<p style=\"padding:12px 2px;font-size:13.5px;color:var(--b3)\">Start typing to find anything.<\u002Fp>';return;}const hits=searchIndex().filter(x=>(x.label+' '+x.sub).toLowerCase().includes(q)).slice(0,12);if(!hits.length){box.innerHTML=`<p style=\"padding:12px 2px;font-size:13.5px;color:var(--b3)\">Nothing matches \"${esc(q)}\".<\u002Fp>`;return;}box.innerHTML='<div class=\"card rowlist stagger\">'+hits.map(x=>`<button class=\"row\" style=\"width:100%;text-align:left\" onclick=\"closeSheet();go('${x.go}')\"><div class=\"grow\"><div class=\"title\">${esc(x.label)}<\u002Fdiv><div class=\"meta\">${x.sub?esc(x.sub):''}<\u002Fdiv><\u002Fdiv><span class=\"chip\">${x.type}<\u002Fspan><\u002Fbutton>`).join('')+'<\u002Fdiv>';}\n\n    // ---- SAMPLE DATA ----\n    function loadSample(){\n      const plus=n=>{const d=new Date();d.setDate(d.getDate()+n);return d.toISOString().slice(0,10);},minus=n=>plus(-n);\n      const g1=uid(),g2=uid(),g3=uid();\n      S.goals=[{id:g1,title:'Own a home',horizon:'5 years',target:plus(1500),progress:35},{id:g2,title:'Build a 6-month emergency fund',horizon:'1 year',target:plus(300),progress:55},{id:g3,title:'Run a half marathon',horizon:'90 days',target:plus(80),progress:40}];\n      S.projects=[{id:uid(),title:'Save for a down payment',goalId:g1,status:'Active',budget:40000,spent:14000,notes:'Target 10% down. Auto-transfer every payday.',tasks:[{id:uid(),title:'Open a high-yield savings account',due:minus(20),done:true,doneAt:Date.now()-1728e6},{id:uid(),title:'Set up automatic transfer',due:minus(5),done:true,doneAt:Date.now()-432e6},{id:uid(),title:'Get pre-approval estimate',due:plus(14),done:false},{id:uid(),title:'Research first-time buyer programs',due:plus(30),done:false}]},{id:uid(),title:'Half marathon training',goalId:g3,status:'Active',budget:0,spent:0,notes:'12-week plan. Long run Sundays.',tasks:[{id:uid(),title:'Buy proper running shoes',due:minus(2),done:true,doneAt:Date.now()-1728e5},{id:uid(),title:'Complete week 4 long run',due:plus(2),done:false},{id:uid(),title:'Register for the race',due:minus(1),done:false}]}];\n      S.home=[{id:uid(),item:'HVAC filter',category:'Maintenance',lastService:minus(60),nextDue:plus(20)},{id:uid(),item:'Water heater',category:'Appliance',lastService:minus(400),warrantyUntil:plus(700)},{id:uid(),item:'Smoke detector batteries',category:'Maintenance',lastService:minus(200),nextDue:plus(5)}];\n      S.vehicles=[{id:uid(),name:'2016 Honda Accord',odometer:'92400',insurance:plus(40),registration:plus(110),services:[{id:uid(),type:'Oil change',date:minus(50),cost:65,odo:'90100'},{id:uid(),type:'Front brake pads',date:minus(120),cost:280,odo:'87500'}]}];\n      S.vault=[{id:uid(),title:'Passport',category:'Identity',ref:'•••• 4821',expires:plus(900)},{id:uid(),title:'Auto insurance policy',category:'Insurance',ref:'POL-77204',expires:plus(40)},{id:uid(),title:'Apartment lease',category:'Contracts',ref:'',expires:plus(220)}];\n      S.family=[{id:uid(),name:'Maria',relation:'Spouse',phone:'555-0142',medical:'Penicillin allergy',emergency:true},{id:uid(),name:'Dr. Allen',relation:'Family doctor',phone:'555-0199',medical:'',emergency:true}];\n      S.finance={bills:[{id:uid(),name:'Rent',amount:1450,dueDay:'1',autopay:true},{id:uid(),name:'Electric',amount:95,dueDay:'12',autopay:false},{id:uid(),name:'Phone',amount:60,dueDay:'18',autopay:true}],subs:[{id:uid(),name:'Streaming bundle',amount:24,cycle:'Monthly'},{id:uid(),name:'Gym',amount:300,cycle:'Yearly'}],debts:[{id:uid(),name:'Car loan',balance:8200,rate:'4.9'}],assets:[{id:uid(),name:'Emergency savings',value:6600},{id:uid(),name:'2016 Honda Accord',value:14000}]};\n      S.emergency={medical:'Blood type O+. Mild asthma — rescue inhaler in bag.',insurance:'Health: BlueCross member 99812. Auto: policy POL-77204.',plan:'Meet at the corner store on Elm if separated. Out-of-town contact: Aunt Rosa 555-0177.'};\n      log('Loaded sample data');save();go('today');render();toast('Sample data loaded — explore, then erase in Settings');\n    }\n\n    // ---- EMERGENCY ----\n    function openEmergency(){\n      if(navigator.vibrate) navigator.vibrate([10,50,10]);\n      const ice=S.family.filter(f=>f.emergency||f.phone),E=S.emergency;\n      document.getElementById('emg').innerHTML=`\n      <div class=\"emg-pulse\"><div class=\"emg-pulse-dot\">
